<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Lap Files - Обмен файлами</title>
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- QR Code -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        :root {
            --bg-primary: #0a0c10;
            --bg-secondary: #14181f;
            --bg-card: #1e2430;
            --text-primary: #ffffff;
            --text-secondary: #a0aec0;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border-color: #2d3748;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        body {
            background: var(--bg-primary);
            min-height: 100vh;
            padding: 20px;
            color: var(--text-primary);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Кнопка Add */
        .add-button {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, var(--accent), #1e40af);
            color: white;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            text-decoration: none;
            font-weight: bold;
            font-size: 24px;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.5);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .add-button:hover {
            transform: scale(1.1) rotate(90deg);
            background: linear-gradient(135deg, #2563eb, #1e3a8a);
        }

        /* Объявление сайта */
        .site-announcement {
            background: linear-gradient(135deg, #dc2626, #991b1b);
            color: white;
            padding: 15px 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2em;
            box-shadow: 0 10px 25px rgba(220, 38, 38, 0.3);
            display: none;
            animation: slideDown 0.5s ease;
        }

        .site-announcement.show {
            display: block;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Шапка */
        .header {
            background: var(--bg-card);
            border-radius: 30px;
            padding: 40px 20px;
            margin-bottom: 30px;
            text-align: center;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header h1 {
            color: var(--text-primary);
            font-size: 3.5rem;
            margin-bottom: 15px;
        }

        .header h1 span {
            color: var(--accent);
        }

        .premium-badge {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            padding: 8px 25px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            display: inline-block;
            animation: glow 2s infinite;
        }

        @keyframes glow {
            0%, 100% {
                box-shadow: 0 0 15px rgba(245, 158, 11, 0.3);
            }
            50% {
                box-shadow: 0 0 30px rgba(245, 158, 11, 0.6);
            }
        }

        /* Панель входа */
        .auth-panel {
            background: var(--bg-card);
            border-radius: 30px;
            padding: 40px;
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .token-input-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            max-width: 500px;
            margin: 0 auto;
        }

        .token-input-group input {
            width: 100%;
            padding: 18px 25px;
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            border-radius: 50px;
            font-size: 1.1rem;
            color: var(--text-primary);
            transition: all 0.3s;
            text-align: center;
        }

        .token-input-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
            transform: scale(1.02);
        }

        .token-input-group input::placeholder {
            color: var(--text-secondary);
            text-align: center;
        }

        .token-input-group button {
            width: 100%;
            max-width: 300px;
            padding: 18px 40px;
            background: linear-gradient(135deg, var(--accent), #1e40af);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .token-input-group button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .token-input-group button:hover::before {
            width: 300px;
            height: 300px;
        }

        .token-input-group button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.5);
        }

        .remember-checkbox {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            color: var(--text-secondary);
        }

        .remember-checkbox input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--accent);
        }

        /* Информационные блоки */
        .info-card {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 25px;
            margin: 20px 0;
            border: 1px solid var(--border-color);
            transition: all 0.3s;
        }

        .info-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 15px 30px rgba(59, 130, 246, 0.2);
        }

        .telegram-info {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            border-radius: 20px;
            padding: 25px;
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            animation: slideIn 0.7s ease;
        }

        .telegram-info a {
            background: #0088cc;
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .telegram-info a:hover {
            transform: scale(1.05);
            background: #00a0e0;
            box-shadow: 0 10px 20px rgba(0,136,204,0.3);
        }

        .premium-offer {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            padding: 25px;
            border-radius: 20px;
            margin-top: 30px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            animation: slideIn 0.8s ease;
            border: 2px solid rgba(255,255,255,0.2);
        }

        /* Основные кнопки */
        .action-buttons {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin: 40px 0;
        }

        .action-btn {
            width: 100%;
            max-width: 500px;
            padding: 25px 40px;
            border: none;
            border-radius: 60px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            position: relative;
            overflow: hidden;
        }

        .action-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .action-btn:hover::after {
            width: 500px;
            height: 500px;
        }

        .action-btn.upload {
            background: linear-gradient(135deg, #059669, #047857);
        }

        .action-btn.download {
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
        }

        .action-btn.profile {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
        }

        .action-btn.settings {
            background: linear-gradient(135deg, #6b7280, #4b5563);
        }

        .action-btn:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 30px rgba(0,0,0,0.3);
        }

        .premium-label {
            background: rgba(255,255,255,0.2);
            padding: 5px 20px;
            border-radius: 30px;
            font-size: 0.9rem;
            margin-left: 10px;
        }

        /* Контент */
        .content-section {
            background: var(--bg-card);
            border-radius: 30px;
            padding: 30px;
            margin: 30px 0;
            border: 1px solid var(--border-color);
            animation: fadeIn 0.5s ease;
        }

        /* Карточки файлов */
        .files-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .file-card {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 20px;
            position: relative;
            border: 1px solid var(--border-color);
            transition: all 0.3s;
            animation: fadeIn 0.5s ease;
        }

        .file-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 15px 30px rgba(59, 130, 246, 0.2);
        }

        .file-card.premium {
            border: 2px solid #f59e0b;
        }

        .file-delete {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #dc2626;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .file-delete:hover {
            background: #b91c1c;
            transform: rotate(90deg);
        }

        /* Настройки уведомлений */
        .notifications-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .notification-item {
            background: var(--bg-secondary);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid var(--border-color);
            transition: all 0.3s;
        }

        .notification-item:hover {
            border-color: var(--accent);
            transform: translateX(5px);
        }

        .notification-item label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            font-size: 1rem;
            color: var(--text-primary);
        }

        .notification-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--accent);
        }

        .save-settings-btn {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }

        .save-settings-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.02);
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 1001;
            padding: 20px;
            overflow-y: auto;
            animation: fadeIn 0.3s;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 30px;
            padding: 40px;
            max-width: 500px;
            margin: 50px auto;
            position: relative;
            border: 1px solid var(--border-color);
            animation: slideUp 0.4s;
        }

        .close {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 35px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.3s;
        }

        .close:hover {
            color: var(--text-primary);
            transform: rotate(90deg);
        }

        /* Прогресс бар */
        .progress-bar {
            width: 100%;
            height: 10px;
            background: var(--border-color);
            border-radius: 5px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #1e40af);
            width: 0%;
            transition: width 0.3s;
        }

        /* Анимация загрузки */
        .loading {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 3px solid var(--border-color);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2.5rem;
            }
            
            .action-btn {
                padding: 20px 30px;
                font-size: 1.2rem;
            }
            
            .add-button {
                bottom: 20px;
                right: 20px;
                width: 60px;
                height: 60px;
                font-size: 20px;
            }
            
            .modal-content {
                padding: 30px 20px;
            }

            .telegram-info {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <!-- Кнопка Add -->
    <a href="https://bthebfr.github.io/lap-about/" class="add-button" id="adButton" target="_blank">+</a>

    <div class="container">
        <!-- Объявление от админа -->
        <div class="site-announcement" id="announcement"></div>

        <!-- Шапка -->
        <div class="header">
            <h1><span>Lap Files</span> от Lap.comp</h1>
            <div>
                <span class="premium-badge">💎 Премиум: 5 ГБ, безлимит файлов, бессрочно</span>
            </div>
        </div>

        <!-- Панель входа -->
        <div class="auth-panel" id="authPanel">
            <div class="token-input-group">
                <input type="text" id="tokenInput" placeholder="Введите ваш токен" autocomplete="off">
                <button onclick="login()">Войти</button>
                <label class="remember-checkbox">
                    <input type="checkbox" id="rememberMe"> Запомнить меня
                </label>
            </div>
            
            <!-- Информация о Telegram боте -->
            <div class="telegram-info">
                <span style="font-size: 1.1rem;">🔐 Нет токена? Получите в Telegram!</span>
                <a href="https://t.me/LapFilesBot" target="_blank">@LapFilesBot</a>
            </div>

            <!-- Реклама премиума -->
            <div class="premium-offer">
                💎 Премиум: загружай до 5 ГБ, безлимит файлов, бессрочное хранение! Купи в Telegram боте
            </div>
        </div>

        <!-- Панель пользователя (показывается после входа) -->
        <div class="auth-panel" id="userPanel" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px;">
                <div>
                    <h2 id="userName" style="margin-bottom: 10px;"></h2>
                    <p style="color: var(--text-secondary);">Токен: <span id="userToken"></span></p>
                    <p style="color: var(--text-secondary);" id="userStatus"></p>
                    <p style="color: var(--text-secondary);" id="userFilesCount"></p>
                </div>
                <button onclick="logout()" style="padding: 12px 30px; background: #dc2626; color: white; border: none; border-radius: 50px; cursor: pointer; font-size: 1rem; transition: all 0.3s;">Выйти</button>
            </div>
        </div>

        <!-- Админ-панель -->
        <div class="auth-panel" id="adminPanel" style="display: none; background: linear-gradient(135deg, #991b1b, #7f1d1d); color: white;">
            <h2 style="margin-bottom: 20px;">👑 Админ-панель</h2>
            <div style="display: flex; flex-direction: column; gap: 15px;">
                <textarea id="adminAnnouncement" placeholder="Текст объявления..." style="width: 100%; padding: 15px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 15px; color: white; font-size: 1rem;" rows="3"></textarea>
                <div style="display: flex; gap: 15px;">
                    <button onclick="postAnnouncement()" style="flex: 1; padding: 12px; background: white; color: #991b1b; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; transition: all 0.3s;">Опубликовать</button>
                    <button onclick="clearAnnouncement()" style="flex: 1; padding: 12px; background: transparent; color: white; border: 2px solid white; border-radius: 50px; cursor: pointer; transition: all 0.3s;">Убрать</button>
                </div>
            </div>
        </div>

        <!-- Основные кнопки -->
        <div class="action-buttons" id="mainButtons" style="display: none;">
            <button class="action-btn upload" onclick="showUploadModal()">
                📤 Выложить файл
                <span class="premium-label" id="uploadLimit">до 250 МБ, макс 2</span>
            </button>
            <button class="action-btn download" onclick="showDownloadModal()">
                📥 Получить файл
                <span class="premium-label">по коду</span>
            </button>
            <button class="action-btn profile" onclick="showProfile()">
                👤 Мой профиль
                <span class="premium-label">управление</span>
            </button>
            <button class="action-btn settings" onclick="showSettings()">
                ⚙️ Настройки
                <span class="premium-label">уведомления</span>
            </button>
        </div>

        <!-- Контент -->
        <div class="content-section" id="content"></div>
    </div>

    <!-- Модальное окно -->
    <div class="modal" id="modal">
        <div class="modal-content" id="modalContent">
            <span class="close" onclick="closeModal()">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        // ========== КОНФИГУРАЦИЯ ==========
        const SUPABASE_URL = 'https://pgtqiqtaoiathnhlpyqz.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_JM6hWwjvmW4l56k44e061g_mfwBkuiX';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const SHEETS_API_URL = 'https://script.google.com/macros/s/AKfycbyTecayVPvAqw0Qx4KxBsTeSW34mNvuOAJYnyWzKHH_J8GMChfbPyavPQ9BqPwFN_pV/exec';
        const TELEGRAM_BOT_TOKEN = '8522117754:AAGyIglTGd6-QLFzCoLyhb9w7-rerFlQ-Gk';

        // ========== ПЕРЕМЕННЫЕ ==========
        let currentUser = null;
        let isPremium = false;
        let isAdmin = false;
        let rememberMe = false;
        let notificationSettings = {};

        // ========== ЗАГРУЗКА ==========
        window.onload = async function() {
            console.log('Сайт загружен');
            
            // Проверяем сохраненного пользователя
            const savedUser = localStorage.getItem('lapFiles_user');
            const savedToken = localStorage.getItem('lapFiles_token');
            
            if (savedUser && savedToken) {
                currentUser = JSON.parse(savedUser);
                document.getElementById('tokenInput').value = savedToken;
                rememberMe = true;
                document.getElementById('rememberMe').checked = true;
                await login(true);
            }
            
            // Загружаем объявление
            await loadAnnouncement();
            
            // Если пользователь уже вошел, загружаем его настройки и файлы
            if (currentUser) {
                await loadUserFiles();
                if (currentUser.telegramId) {
                    await loadNotificationSettings(currentUser.telegramId);
                }
            }
        };

        // ========== ФУНКЦИИ ДЛЯ РАБОТЫ С TELEGRAM ==========
        async function sendTelegramNotification(telegramId, type, data = {}) {
            if (!telegramId) return;
            
            // Проверяем настройки уведомлений
            if (notificationSettings[telegramId] && notificationSettings[telegramId][type] === false) {
                return;
            }
            
            let message = '';
            
            switch(type) {
                case 'login':
                    message = `🔐 ВХОД В АККАУНТ\nВремя: ${new Date().toLocaleString()}\nБраузер: ${navigator.userAgent}`;
                    break;
                case 'logout':
                    message = `👋 ВЫХОД ИЗ АККАУНТА\nВремя: ${new Date().toLocaleString()}`;
                    break;
                case 'upload':
                    message = `📤 ФАЙЛ ЗАГРУЖЕН\nНазвание: ${data.name}\nРазмер: ${data.size}\nКод: ${data.code}`;
                    break;
                case 'download':
                    message = `📥 ФАЙЛ СКАЧАН\nФайл: ${data.name}\nКод: ${data.code}\nСкачал: ${data.downloader}`;
                    break;
                case 'delete':
                    message = `🗑️ ФАЙЛ УДАЛЕН\nФайл: ${data.name}\nКод: ${data.code}`;
                    break;
                case 'password_set':
                    message = `🔒 ПАРОЛЬ УСТАНОВЛЕН\nФайл: ${data.name}\nКод: ${data.code}`;
                    break;
                case 'password_removed':
                    message = `🔓 ПАРОЛЬ СНЯТ\nФайл: ${data.name}\nКод: ${data.code}`;
                    break;
                case 'premium_activated':
                    message = `💎 ПРЕМИУМ АКТИВИРОВАН\nСрок: до ${data.until}\nЛимиты: 5 ГБ, безлимит файлов`;
                    break;
                case 'premium_expiring':
                    message = `⏰ ПРЕМИУМ ЗАКОНЧИТСЯ ЧЕРЕЗ ${data.days} ДНЯ\nДата: ${data.until}\nПродлить: @LapFilesBot`;
                    break;
                case 'premium_expired':
                    message = `💔 ПРЕМИУМ ЗАКОНЧИЛСЯ\nЛимиты: 250 МБ, 2 файла`;
                    break;
                case 'announcement':
                    message = `📢 НОВОЕ ОБЪЯВЛЕНИЕ\n${data.text}`;
                    break;
                case 'file_expiring':
                    message = `⚠️ ФАЙЛ УДАЛИТСЯ ЧЕРЕЗ ${data.days} ДНЕЙ\nФайл: ${data.name}\nКод: ${data.code}`;
                    break;
                case 'file_expired':
                    message = `❌ ФАЙЛ УДАЛЕН\nФайл: ${data.name}\nКод: ${data.code}\nПричина: истек срок`;
                    break;
                default:
                    return;
            }
            
            try {
                const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
                await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: telegramId,
                        text: message,
                        parse_mode: 'HTML'
                    })
                });
            } catch (error) {
                console.error('Ошибка отправки в Telegram:', error);
            }
        }

        window.login = async function(silent = false) {

            rememberMe = document.getElementById('rememberMe').checked;
            
            if (!token) {
                alert('Введите токен');
                return;
            }

            try {
                const loginBtn = document.querySelector('.token-input-group button');
                loginBtn.innerHTML = '<div class="loading" style="width: 25px; height: 25px;"></div>';
                loginBtn.disabled = true;

                const response = await fetch(`${SHEETS_API_URL}?action=getUser&token=${encodeURIComponent(token)}`);
                const user = await response.json();

                if (user && !user.error) {
                    currentUser = user;
                    isPremium = user.premium === 'ДА';
                    isAdmin = user.admin === 'ДА';
                    
                    // Загружаем настройки уведомлений
                    if (user.telegramId) {
                        await loadNotificationSettings(user.telegramId);
                        await sendTelegramNotification(user.telegramId, 'login');
                    }
                    
                    // Обновляем интерфейс
                    document.getElementById('authPanel').style.display = 'none';
                    document.getElementById('userPanel').style.display = 'block';
                    document.getElementById('mainButtons').style.display = 'flex';

                    document.getElementById('userStatus').innerHTML = isPremium ? '💎 Премиум статус' : '👤 Обычный пользователь';
                    
                    if (isPremium) {
                        document.getElementById('uploadLimit').innerHTML = 'до 5 ГБ, безлимит';
                    }
                    
                    if (isAdmin) {
                        document.getElementById('adminPanel').style.display = 'block';
                    }
                    
                    if (rememberMe) {
                        localStorage.setItem('lapFiles_user', JSON.stringify(user));
                        localStorage.setItem('lapFiles_token', token);
                    }
                    
                    await loadUserFiles();
                    
                    if (!silent) {
                        alert('✅ Успешный вход!');
                    }
                } else {
                    alert('❌ Неверный токен');
                }
            } catch (error) {
                console.error('Ошибка входа:', error);
                alert('❌ Ошибка при входе. Проверьте подключение к интернету.');
            } finally {
                const loginBtn = document.querySelector('.token-input-group button');

        window.uploadFile = async function() {
            const files = document.getElementById('fileInput').files;
            const password = document.getElementById('filePassword').value;
            const expiry = document.getElementById('fileExpiry').value;
            
            if (!files.length) {
                alert('Выберите файлы');
                return;
            }
            
            // Проверка лимитов
            if (!isPremium) {
                if (files.length > 2) {
                    alert('Обычные пользователи могут загружать не больше 2 файлов');
                    return;
                }
                
                for (let file of files) {
                    if (file.size > 250 * 1024 * 1024) {
                        alert('Файл слишком большой. Максимум 250 МБ');
                        return;
                    }
                }
            } else {
                let totalSize = 0;
                for (let file of files) {
                    totalSize += file.size;
                }
                if (totalSize > 5 * 1024 * 1024 * 1024) {
                    alert('Суммарный размер файлов превышает 5 ГБ');
                    return;
                }
            }
            
            document.querySelector('.progress-bar').style.display = 'block';
            
            try {
                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    
                    // Генерируем код файла
                    const fileCode = 'LF' + Math.random().toString(36).substr(2, 8).toUpperCase();
                    
                    // Загружаем в Supabase
                    const fileName = `${Date.now()}_${file.name}`;
                    const { data, error } = await supabase.storage
                        .from('files')
                        .upload(`${currentUser.token}/${fileName}`, file, {
                            cacheControl: '3600',
                            upsert: false
                        });
                    
                    if (error) throw error;
                    
                    // Получаем ссылку
                    const { data: { publicUrl } } = supabase.storage
                        .from('files')
                        .getPublicUrl(`${currentUser.token}/${fileName}`);
                    
                    // Сохраняем в Google Sheets
                    const saveResponse = await fetch(`${SHEETS_API_URL}?action=saveFile`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            code: fileCode,
                            owner: currentUser.token,
                            name: file.name,
                            size: formatBytes(file.size),
                            type: file.type || 'unknown',
                            password: password,
                            url: publicUrl,
                            expiry: expiry,
                            ownerName: currentUser.name
                        })
                    });
                    
                    const saveResult = await saveResponse.json();
                    
                    if (saveResult.error) {
                        throw new Error(saveResult.error);
                    }
                    
                    // Обновляем прогресс
                    const progress = ((i + 1) / files.length) * 100;
                    document.getElementById('uploadProgressFill').style.width = progress + '%';
                    
                    // Отправляем уведомление
                    if (currentUser.telegramId) {
                        await sendTelegramNotification(currentUser.telegramId, 'upload', {
                            name: file.name,
                            size: formatBytes(file.size),
                            code: fileCode
                        });
                        
                        if (password) {
                            await sendTelegramNotification(currentUser.telegramId, 'password_set', {
                                name: file.name,
                                code: fileCode
                            });
                        }
                    }
                    
                    // Показываем QR для последнего файла
                    if (i === files.length - 1) {
                        showQRCode(fileCode, publicUrl);
                    }
                }
                
                alert('✅ Файлы успешно загружены!');
                closeModal();
                await loadUserFiles();
                
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                alert('❌ Ошибка при загрузке файлов: ' + error.message);
            }
        };

                return;

            try {

                            if (owner && owner.telegramId) {

                                    code: file.code,
                                    downloader: currentUser.name
                                });

                        }
                    }
                } else {
                    alert('❌ Файл не найден или истек срок хранения');
                }
            } catch (error) {
                console.error('Ошибка:', error);
                alert('❌ Ошибка при поиске файла');
            }
        };

        window.deleteFile = async function(fileCode) {
            if (!confirm('Удалить файл?')) return;
            
            try {
                const response = await fetch(`${SHEETS_API_URL}?action=getFile&code=${fileCode}`);
                const file = await response.json();
                
                const deleteResponse = await fetch(`${SHEETS_API_URL}?action=deleteFile&code=${fileCode}&token=${currentUser.token}`);
                const result = await deleteResponse.json();
                
                if (result.success) {
                    // Удаляем из Supabase
                    await supabase.storage
                        .from('files')
                        .remove([`${currentUser.token}/${file.name}`]);
                    
                    if (currentUser.telegramId) {
                        await sendTelegramNotification(currentUser.telegramId, 'delete', {
                            name: file.name,
                            code: fileCode
                        });
                    }
                    
                    alert('✅ Файл удален');
                    await loadUserFiles();
                } else {
                    alert('❌ Ошибка при удалении');
                }
            } catch (error) {
                console.error('Ошибка удаления:', error);
                alert('❌ Ошибка при удалении');
            }
        };

        window.changeFilePassword = function(fileCode) {
            const modal = document.getElementById('modal');
            const modalBody = document.getElementById('modalBody');
            
            modalBody.innerHTML = `
                <h2 style="margin-bottom: 20px;">🔒 Управление паролем</h2>
                <input type="password" id="newPassword" placeholder="Новый пароль" style="width: 100%; padding: 15px; background: var(--bg-secondary); border: 2px solid var(--border-color); border-radius: 15px; color: var(--text-primary); margin-bottom: 20px;">
                <div style="display: flex; gap: 10px;">
                    <button onclick="updateFilePassword('${fileCode}')" style="flex: 1; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 50px; cursor: pointer;">
                        Сохранить
                    </button>
                    <button onclick="removeFilePassword('${fileCode}')" style="flex: 1; padding: 15px; background: var(--danger); color: white; border: none; border-radius: 50px; cursor: pointer;">
                        Снять пароль
                    </button>
                </div>
            `;
            
            modal.style.display = 'block';
        };

        window.updateFilePassword = async function(fileCode) {
            const newPassword = document.getElementById('newPassword').value;
            
            try {
                const response = await fetch(`${SHEETS_API_URL}?action=getFile&code=${fileCode}`);
                const file = await response.json();
                
                const updateResponse = await fetch(`${SHEETS_API_URL}?action=updateFilePassword&code=${fileCode}&password=${newPassword}&token=${currentUser.token}`);
                const result = await updateResponse.json();
                
                if (result.success) {
                    if (currentUser.telegramId) {
                        await sendTelegramNotification(currentUser.telegramId, 'password_set', {
                            name: file.name,
                            code: fileCode
                        });
                    }
                    
                    alert('✅ Пароль обновлен');
                    closeModal();
                    await loadUserFiles();
                } else {
                    alert('❌ Ошибка при обновлении пароля');
                }
            } catch (error) {
                console.error('Ошибка:', error);
                alert('❌ Ошибка');
            }
        };

        window.removeFilePassword = async function(fileCode) {
            try {
                const response = await fetch(`${SHEETS_API_URL}?action=getFile&code=${fileCode}`);
                const file = await response.json();
                
                const updateResponse = await fetch(`${SHEETS_API_URL}?action=updateFilePassword&code=${fileCode}&password=&token=${currentUser.token}`);
                const result = await updateResponse.json();
                
                if (result.success) {
                    if (currentUser.telegramId) {
                        await sendTelegramNotification(currentUser.telegramId, 'password_removed', {
                            name: file.name,
                            code: fileCode
                        });
                    }
                    
                    alert('✅ Пароль снят');
                    closeModal();
                    await loadUserFiles();
                } else {
                    alert('❌ Ошибка при снятии пароля');
                }
            } catch (error) {
                console.error('Ошибка:', error);
                alert('❌ Ошибка');
            }
        };

        // ========== ФУНКЦИИ НАСТРОЕК ==========
        window.showSettings = async function() {
            if (!currentUser || !currentUser.telegramId) {
                alert('У вас нет Telegram ID для настройки уведомлений');
                return;
            }
            
            const settings = notificationSettings[currentUser.telegramId] || {
                login: true,
                upload: true,
                download: false,
                delete: true,
                premium: true,
                announcement: true,
                expiry: false
            };
            
            const modal = document.getElementById('modal');
            const modalBody = document.getElementById('modalBody');
            
            modalBody.innerHTML = `
                <h2 style="margin-bottom: 20px;">⚙️ Настройки уведомлений</h2>
                <div class="notifications-grid">
                    <div class="notification-item">
                        <label>
                            Вход в аккаунт
                            <input type="checkbox" id="notify_login" ${settings.login ? 'checked' : ''}>
                        </label>
                    </div>
                    <div class="notification-item">
                        <label>
                            Загрузка файлов
                            <input type="checkbox" id="notify_upload" ${settings.upload ? 'checked' : ''}>
                        </label>
                    </div>
                    <div class="notification-item">
                        <label>
                            Скачивание файлов
                            <input type="checkbox" id="notify_download" ${settings.download ? 'checked' : ''}>
                        </label>
                    </div>
                    <div class="notification-item">
                        <label>
                            Удаление файлов
                            <input type="checkbox" id="notify_delete" ${settings.delete ? 'checked' : ''}>
                        </label>
                    </div>
                    <div class="notification-item">
                        <label>
                            Премиум уведомления
                            <input type="checkbox" id="notify_premium" ${settings.premium ? 'checked' : ''}>
                        </label>
                    </div>
                    <div class="notification-item">
                        <label>
                            Объявления админа
                            <input type="checkbox" id="notify_announcement" ${settings.announcement ? 'checked' : ''}>
                        </label>
                    </div>
                    <div class="notification-item">
                        <label>
                            Истечение срока файлов
                            <input type="checkbox" id="notify_expiry" ${settings.expiry ? 'checked' : ''}>
                        </label>
                    </div>
                </div>
                <button class="save-settings-btn" onclick="saveSettings()">Сохранить настройки</button>
            `;
            
            modal.style.display = 'block';
        };

        window.saveSettings = async function() {
            const newSettings = {
                login: document.getElementById('notify_login').checked,
                upload: document.getElementById('notify_upload').checked,
                download: document.getElementById('notify_download').checked,
                delete: document.getElementById('notify_delete').checked,
                premium: document.getElementById('notify_premium').checked,
                announcement: document.getElementById('notify_announcement').checked,
                expiry: document.getElementById('notify_expiry').checked
            };
            
            const success = await saveNotificationSettings(currentUser.telegramId, newSettings);
            
            if (success) {
                alert('✅ Настройки сохранены');
                closeModal();
            } else {
                alert('❌ Ошибка при сохранении');
            }
        };

        // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        window.closeModal = function() {
            document.getElementById('modal').style.display = 'none';
        };

        window.onclick = function(event) {
            const modal = document.getElementById('modal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        };
    </script>
</body>
</html>
