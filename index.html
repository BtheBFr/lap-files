<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Lap Files - Обмен файлами</title>
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- QR Code -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        :root {
            --bg-primary: #0a0c10;
            --bg-secondary: #14181f;
            --bg-card: #1e2430;
            --text-primary: #ffffff;
            --text-secondary: #a0aec0;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border-color: #2d3748;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        body {
            background: var(--bg-primary);
            min-height: 100vh;
            padding: 20px;
            color: var(--text-primary);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Кнопка Add */
        .add-button {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, var(--accent), #1e40af);
            color: white;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            text-decoration: none;
            font-weight: bold;
            font-size: 24px;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.5);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .add-button:hover {
            transform: scale(1.1) rotate(90deg);
            background: linear-gradient(135deg, #2563eb, #1e3a8a);
        }

        /* Объявление сайта */
        .site-announcement {
            background: linear-gradient(135deg, #dc2626, #991b1b);
            color: white;
            padding: 15px 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2em;
            box-shadow: 0 10px 25px rgba(220, 38, 38, 0.3);
            display: none;
        }

        .site-announcement.show {
            display: block;
        }

        /* Шапка */
        .header {
            background: var(--bg-card);
            border-radius: 30px;
            padding: 40px 20px;
            margin-bottom: 30px;
            text-align: center;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .header h1 {
            color: var(--text-primary);
            font-size: 3.5rem;
            margin-bottom: 15px;
        }

        .header h1 span {
            color: var(--accent);
        }

        .premium-badge {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            padding: 8px 25px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            display: inline-block;
        }

        /* Панель входа */
        .auth-panel {
            background: var(--bg-card);
            border-radius: 30px;
            padding: 40px;
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .token-input-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            max-width: 500px;
            margin: 0 auto;
        }

        .token-input-group input {
            width: 100%;
            padding: 18px 25px;
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            border-radius: 50px;
            font-size: 1.1rem;
            color: var(--text-primary);
            transition: all 0.3s;
            text-align: center;
        }

        .token-input-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
        }

        .token-input-group button {
            width: 100%;
            max-width: 300px;
            padding: 18px 40px;
            background: linear-gradient(135deg, var(--accent), #1e40af);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .token-input-group button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.5);
        }

        .remember-checkbox {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            color: var(--text-secondary);
        }

        .remember-checkbox input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--accent);
        }

        /* Информационные блоки */
        .telegram-info {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            border-radius: 20px;
            padding: 25px;
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .telegram-info a {
            background: #0088cc;
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .telegram-info a:hover {
            transform: scale(1.05);
            background: #00a0e0;
        }

        .premium-offer {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            padding: 25px;
            border-radius: 20px;
            margin-top: 30px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            border: 2px solid rgba(255,255,255,0.2);
        }

        /* Основные кнопки */
        .action-buttons {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin: 40px 0;
        }

        .action-btn {
            width: 100%;
            max-width: 500px;
            padding: 25px 40px;
            border: none;
            border-radius: 60px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .action-btn.upload {
            background: linear-gradient(135deg, #059669, #047857);
        }

        .action-btn.download {
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
        }

        .action-btn.profile {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
        }

        .action-btn.settings {
            background: linear-gradient(135deg, #6b7280, #4b5563);
        }

        .action-btn:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 30px rgba(0,0,0,0.3);
        }

        .premium-label {
            background: rgba(255,255,255,0.2);
            padding: 5px 20px;
            border-radius: 30px;
            font-size: 0.9rem;
            margin-left: 10px;
        }

        /* Контент */
        .content-section {
            background: var(--bg-card);
            border-radius: 30px;
            padding: 30px;
            margin: 30px 0;
            border: 1px solid var(--border-color);
        }

        /* Настройки уведомлений */
        .notifications-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .notification-item {
            background: var(--bg-secondary);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid var(--border-color);
        }

        .notification-item label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
        }

        .notification-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--accent);
        }

        .save-settings-btn {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        .save-settings-btn:hover {
            background: var(--accent-hover);
        }

        /* Карточки файлов */
        .files-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .file-card {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 20px;
            position: relative;
            border: 1px solid var(--border-color);
            transition: all 0.3s;
        }

        .file-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 15px 30px rgba(59, 130, 246, 0.2);
        }

        .file-card.premium {
            border: 2px solid #f59e0b;
        }

        .file-delete {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--danger);
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .file-delete:hover {
            background: #b91c1c;
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 1001;
            padding: 20px;
            overflow-y: auto;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 30px;
            padding: 40px;
            max-width: 500px;
            margin: 50px auto;
            position: relative;
            border: 1px solid var(--border-color);
        }

        .close {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 35px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.3s;
        }

        .close:hover {
            color: var(--text-primary);
        }

        /* Прогресс бар */
        .progress-bar {
            width: 100%;
            height: 10px;
            background: var(--border-color);
            border-radius: 5px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #1e40af);
            width: 0%;
            transition: width 0.3s;
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2.5rem;
            }
            
            .action-btn {
                padding: 20px 30px;
                font-size: 1.2rem;
            }
            
            .add-button {
                bottom: 20px;
                right: 20px;
                width: 60px;
                height: 60px;
                font-size: 20px;
            }
            
            .modal-content {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Кнопка Add -->
    <a href="#" class="add-button" id="adButton" target="_blank">+</a>

    <div class="container">
        <!-- Объявление от админа -->
        <div class="site-announcement" id="announcement"></div>

        <!-- Шапка -->
        <div class="header">
            <h1><span>Lap Files</span> от Lap.comp</h1>
            <div>
                <span class="premium-badge">Премиум: 5 ГБ, безлимит файлов, бессрочно</span>
            </div>
        </div>

        <!-- Панель входа -->
        <div class="auth-panel" id="authPanel">
            <div class="token-input-group">
                <input type="text" id="tokenInput" placeholder="Введите ваш токен" autocomplete="off">
                <button onclick="login()">Войти</button>
                <label class="remember-checkbox">
                    <input type="checkbox" id="rememberMe"> Запомнить меня
                </label>
            </div>
            
            <!-- Информация о Telegram боте -->
            <div class="telegram-info">
                <span>Нет токена? Получите в Telegram!</span>
                <a href="https://t.me/LapFilesBot" target="_blank">@LapFilesBot</a>
            </div>

            <!-- Реклама премиума -->
            <div class="premium-offer">
                Премиум: загружай до 5 ГБ, безлимит файлов, бессрочное хранение! Купи в Telegram боте
            </div>
        </div>

        <!-- Панель пользователя (показывается после входа) -->
        <div class="auth-panel" id="userPanel" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px;">
                <div>
                    <h2 id="userName" style="margin-bottom: 10px;"></h2>
                    <p style="color: var(--text-secondary);">Токен: <span id="userToken"></span></p>
                    <p style="color: var(--text-secondary);" id="userStatus"></p>
                    <p style="color: var(--text-secondary);" id="userFilesCount"></p>
                </div>
                <button onclick="logout()" style="padding: 12px 30px; background: var(--danger); color: white; border: none; border-radius: 50px; cursor: pointer; font-size: 1rem;">Выйти</button>
            </div>
        </div>

        <!-- Админ-панель -->
        <div class="auth-panel" id="adminPanel" style="display: none; background: linear-gradient(135deg, #991b1b, #7f1d1d);">
            <h2 style="margin-bottom: 20px;">Админ-панель</h2>
            <div style="display: flex; flex-direction: column; gap: 15px;">
                <textarea id="adminAnnouncement" placeholder="Текст объявления..." style="width: 100%; padding: 15px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 15px; color: white; font-size: 1rem;" rows="3"></textarea>
                <div style="display: flex; gap: 15px;">
                    <button onclick="postAnnouncement()" style="flex: 1; padding: 12px; background: white; color: #991b1b; border: none; border-radius: 50px; cursor: pointer; font-weight: bold;">Опубликовать</button>
                    <button onclick="clearAnnouncement()" style="flex: 1; padding: 12px; background: transparent; color: white; border: 2px solid white; border-radius: 50px; cursor: pointer;">Убрать</button>
                </div>
            </div>
        </div>

        <!-- Основные кнопки -->
        <div class="action-buttons" id="mainButtons" style="display: none;">
            <button class="action-btn upload" onclick="showUploadModal()">
                Выложить файл
                <span class="premium-label" id="uploadLimit">до 250 МБ, макс 2</span>
            </button>
            <button class="action-btn download" onclick="showDownloadModal()">
                Получить файл
                <span class="premium-label">по коду</span>
            </button>
            <button class="action-btn profile" onclick="showProfile()">
                Профиль
                <span class="premium-label">управление</span>
            </button>
            <button class="action-btn settings" onclick="showSettings()">
                Настройки
                <span class="premium-label">уведомления</span>
            </button>
        </div>

        <!-- Контент -->
        <div class="content-section" id="content"></div>
    </div>

    <!-- Модальное окно -->
    <div class="modal" id="modal">
        <div class="modal-content" id="modalContent">
            <span class="close" onclick="closeModal()">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        // ========== КОНФИГУРАЦИЯ ==========
        const SUPABASE_URL = 'https://pgtqiqtaoiathnhlpyqz.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_JM6hWwjvmW4l56k44e061g_mfwBkuiX';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const SHEETS_API_URL = 'https://script.google.com/macros/s/AKfycbyTecayVPvAqw0Qx4KxBsTeSW34mNvuOAJYnyWzKHH_J8GMChfbPyavPQ9BqPwFN_pV/exec';
        const TELEGRAM_BOT_TOKEN = '8522117754:AAGyIglTGd6-QLFzCoLyhb9w7-rerFlQ-Gk';
        const AD_LINK = 'https://bthebfr.github.io/lap-about/'; // ЕДИНСТВЕННАЯ ссылка

        // ========== ПЕРЕМЕННЫЕ ==========
        let currentUser = null;
        let isPremium = false;
        let isAdmin = false;
        let rememberMe = false;
        let notificationSettings = {};

        // ========== ЗАГРУЗКА ==========
        window.onload = async function() {
            console.log('Сайт загружен');
            
            // Устанавливаем ссылку для кнопки Add
            document.getElementById('adButton').href = AD_LINK;
            
            // Проверяем сохраненного пользователя
            const savedUser = localStorage.getItem('lapFiles_user');
            const savedToken = localStorage.getItem('lapFiles_token');
            
            if (savedUser && savedToken) {
                currentUser = JSON.parse(savedUser);
                document.getElementById('tokenInput').value = savedToken;
                rememberMe = true;
                document.getElementById('rememberMe').checked = true;
                await login(true);
            }
            
            await loadAnnouncement();
        };

        // ========== УВЕДОМЛЕНИЯ В TELEGRAM ==========
        async function sendTelegramNotification(telegramId, type, data = {}) {
            if (!telegramId) return;
            
            if (notificationSettings[telegramId] && notificationSettings[telegramId][type] === 'НЕТ') {
                return;
            }
            
            let message = '';
            
            switch(type) {
                case 'login':
                    message = `ВХОД В АККАУНТ\nВремя: ${new Date().toLocaleString()}\nБраузер: ${data.browser || 'Unknown'}`;
                    break;
                case 'logout':
                    message = `ВЫХОД ИЗ АККАУНТА\nВремя: ${new Date().toLocaleString()}`;
                    break;
                case 'upload':
                    message = `ФАЙЛ ЗАГРУЖЕН\nНазвание: ${data.name}\nРазмер: ${data.size}\nКод: ${data.code}`;
                    break;
                case 'download':
                    message = `ФАЙЛ СКАЧАН\nФайл: ${data.name}\nКод: ${data.code}\nСкачал: ${data.downloader}`;
                    break;
                case 'delete':
                    message = `ФАЙЛ УДАЛЕН\nФайл: ${data.name}\nКод: ${data.code}`;
                    break;
                case 'password_set':
                    message = `ПАРОЛЬ УСТАНОВЛЕН\nФайл: ${data.name}\nКод: ${data.code}`;
                    break;
                case 'password_removed':
                    message = `ПАРОЛЬ СНЯТ\nФайл: ${data.name}\nКод: ${data.code}`;
                    break;
                case 'premium_activated':
                    message = `ПРЕМИУМ АКТИВИРОВАН\nСрок: до ${data.until}\nЛимиты: 5 ГБ, безлимит файлов`;
                    break;
                case 'premium_expiring':
                    message = `ПРЕМИУМ ЗАКОНЧИТСЯ ЧЕРЕЗ ${data.days} ДНЯ\nДата: ${data.until}\nПродлить: @LapFilesBot`;
                    break;
                case 'premium_expired':
                    message = `ПРЕМИУМ ЗАКОНЧИЛСЯ\nТеперь вы обычный пользователь\nЛимиты: 250 МБ, 2 файла`;
                    break;
                case 'announcement':
                    message = `НОВОЕ ОБЪЯВЛЕНИЕ\nТекст: ${data.text}`;
                    break;
                case 'file_expiring':
                    message = `ФАЙЛ УДАЛИТСЯ ЧЕРЕЗ ${data.days} ДЕНЬ\nФайл: ${data.name}\nКод: ${data.code}\nПродлите в профиле`;
                    break;
                case 'file_expired':
                    message = `ФАЙЛ УДАЛЕН АВТОМАТИЧЕСКИ\nФайл: ${data.name}\nКод: ${data.code}\nПричина: истек срок`;
                    break;
                case 'settings_changed':
                    message = `НАСТРОЙКИ УВЕДОМЛЕНИЙ ИЗМЕНЕНЫ`;
                    break;
            }
            
            if (!message) return;
            
            try {
                const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
                await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: telegramId, text: message })
                });
            } catch (error) {
                console.error('Ошибка отправки в Telegram:', error);
            }
        }

        // ========== ФУНКЦИЯ ВХОДА ==========
        window.login = async function(silent = false) {
            const token = document.getElementById('tokenInput').value;
            rememberMe = document.getElementById('rememberMe').checked;
            
            if (!token) {
                alert('Введите токен');
                return;
            }

            try {
                const loginBtn = document.querySelector('.token-input-group button');
                loginBtn.textContent = 'Вход...';
                loginBtn.disabled = true;

                const response = await fetch(`${SHEETS_API_URL}?action=getUser&token=${encodeURIComponent(token)}`);
                const user = await response.json();

                if (user && !user.error) {
                    currentUser = user;
                    isPremium = user.premium === 'ДА';
                    isAdmin = user.admin === 'ДА';
                    
                    if (user.telegramId) {
                        await sendTelegramNotification(user.telegramId, 'login', {
                            browser: navigator.userAgent
                        });
                    }
                    
                    document.getElementById('authPanel').style.display = 'none';
                    document.getElementById('userPanel').style.display = 'block';
                    document.getElementById('mainButtons').style.display = 'flex';
                    
                    document.getElementById('userName').innerHTML = `Привет, ${user.name}!`;
                    document.getElementById('userToken').textContent = token;
                    document.getElementById('userStatus').innerHTML = isPremium ? 'Премиум' : 'Обычный пользователь';
                    
                    if (isPremium) {
                        document.getElementById('uploadLimit').innerHTML = 'до 5 ГБ, безлимит';
                    }
                    
                    if (isAdmin) {
                        document.getElementById('adminPanel').style.display = 'block';
                    }
                    
                    if (rememberMe) {
                        localStorage.setItem('lapFiles_user', JSON.stringify(user));
                        localStorage.setItem('lapFiles_token', token);
                    }
                    
                    await loadUserFiles();
                    
                    if (!silent) {
                        alert('Успешный вход!');
                    }
                } else {
                    alert('Неверный токен');
                }
            } catch (error) {
                console.error('Ошибка входа:', error);
                alert('Ошибка при входе');
            } finally {
                const loginBtn = document.querySelector('.token-input-group button');
                loginBtn.textContent = 'Войти';
                loginBtn.disabled = false;
            }
        };

        // ========== ВЫХОД ==========
        window.logout = async function() {
            if (currentUser && currentUser.telegramId) {
                await sendTelegramNotification(currentUser.telegramId, 'logout');
            }
            
            currentUser = null;
            isPremium = false;
            isAdmin = false;
            
            localStorage.removeItem('lapFiles_user');
            localStorage.removeItem('lapFiles_token');
            
            document.getElementById('authPanel').style.display = 'block';
            document.getElementById('userPanel').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('mainButtons').style.display = 'none';
            document.getElementById('content').innerHTML = '';
            document.getElementById('tokenInput').value = '';
            document.getElementById('rememberMe').checked = false;
        };

        // ========== ЗАГРУЗКА ОБЪЯВЛЕНИЯ ==========
        window.loadAnnouncement = async function() {
            try {
                const response = await fetch(`${SHEETS_API_URL}?action=getAnnouncement`);
                const announcement = await response.json();
                
                if (announcement && announcement.text) {
                    document.getElementById('announcement').textContent = announcement.text;
                    document.getElementById('announcement').classList.add('show');
                }
            } catch (error) {
                console.error('Ошибка загрузки объявления:', error);
            }
        };

        // ========== ПУБЛИКАЦИЯ ОБЪЯВЛЕНИЯ (АДМИН) ==========
        window.postAnnouncement = async function() {
            if (!isAdmin) return;
            
            const text = document.getElementById('adminAnnouncement').value;
            if (!text) return;
            
            try {
                await fetch(`${SHEETS_API_URL}?action=postAnnouncement&text=${encodeURIComponent(text)}&adminToken=${currentUser.token}`);
                await loadAnnouncement();
                alert('Объявление опубликовано');
                document.getElementById('adminAnnouncement').value = '';
            } catch (error) {
                console.error('Ошибка:', error);
                alert('Ошибка при публикации');
            }
        };

        // ========== УБРАТЬ ОБЪЯВЛЕНИЕ ==========
        window.clearAnnouncement = async function() {
            if (!isAdmin) return;
            
            try {
                await fetch(`${SHEETS_API_URL}?action=clearAnnouncement&adminToken=${currentUser.token}`);
                document.getElementById('announcement').classList.remove('show');
                alert('Объявление убрано');
            } catch (error) {
                console.error('Ошибка:', error);
                alert('Ошибка');
            }
        };

        // ========== НАСТРОЙКИ ==========
        window.showSettings = function() {
            const modal = document.getElementById('modal');
            const modalBody = document.getElementById('modalBody');
            
            modalBody.innerHTML = `
                <h2 style="margin-bottom: 20px;">Настройки уведомлений</h2>
                <div class="notifications-grid">
                    <div class="notification-item">
                        <label>
                            Вход в аккаунт
                            <input type="checkbox" id="notify_login" checked>
                        </label>
                    </div>
                    <div class="notification-item">
                        <label>
                            Загрузка файлов
                            <input type="checkbox" id="notify_upload" checked>
                        </label>
                    </div>
                    <div class="notification-item">
                        <label>
                            Скачивание файлов
                            <input type="checkbox" id="notify_download">
                        </label>
                    </div>
                    <div class="notification-item">
                        <label>
                            Удаление файлов
                            <input type="checkbox" id="notify_delete" checked>
                        </label>
                    </div>
                    <div class="notification-item">
                        <label>
                            Премиум уведомления
                            <input type="checkbox" id="notify_premium" checked>
                        </label>
                    </div>
                    <div class="notification-item">
                        <label>
                            Объявления админа
                            <input type="checkbox" id="notify_announcement" checked>
                        </label>
                    </div>
                    <div class="notification-item">
                        <label>
                            Истечение срока файлов
                            <input type="checkbox" id="notify_expiry">
                        </label>
                    </div>
                </div>
                <button class="save-settings-btn" onclick="saveSettings()">Сохранить настройки</button>
            `;
            
            modal.style.display = 'block';
        };

        window.saveSettings = async function() {
            alert('Настройки сохранены');
            closeModal();
        };

        // ========== ЗАГРУЗКА ФАЙЛОВ ==========
        window.showUploadModal = function() {
            const modal = document.getElementById('modal');
            const modalBody = document.getElementById('modalBody');
            
            modalBody.innerHTML = `
                <h2 style="margin-bottom: 20px;">Загрузить файл</h2>
                <p style="color: var(--text-secondary); margin-bottom: 20px;">${isPremium ? 'Премиум: до 5 ГБ, любое количество файлов' : 'Обычный: до 250 МБ, макс 2 файла'}</p>
                <input type="file" id="fileInput" ${isPremium ? '' : 'multiple'} style="width: 100%; padding: 15px; background: var(--bg-secondary); border: 2px solid var(--border-color); border-radius: 15px; color: var(--text-primary); margin-bottom: 20px;">
                
                <div style="margin-bottom: 20px;">
                    <label style="color: var(--text-secondary); display: block; margin-bottom: 5px;">Пароль (необязательно)</label>
                    <input type="password" id="filePassword" placeholder="Пароль для файла" style="width: 100%; padding: 15px; background: var(--bg-secondary); border: 2px solid var(--border-color); border-radius: 15px; color: var(--text-primary);">
                </div>
                
                <div style="margin-bottom: 20px;">
                    <label style="color: var(--text-secondary); display: block; margin-bottom: 5px;">Срок хранения</label>
                    <select id="fileExpiry" style="width: 100%; padding: 15px; background: var(--bg-secondary); border: 2px solid var(--border-color); border-radius: 15px; color: var(--text-primary);">
                        ${isPremium ? 
                            '<option value="9999">Бессрочно</option>' : 
                            '<option value="1">1 день</option><option value="3">3 дня</option><option value="5">5 дней</option>'
                        }
                    </select>
                </div>
                
                <div class="progress-bar" style="display: none; margin-bottom: 20px;">
                    <div class="progress-fill" id="uploadProgressFill"></div>
                </div>
                
                <button onclick="uploadFile()" style="width: 100%; padding: 18px; background: linear-gradient(135deg, #059669, #047857); color: white; border: none; border-radius: 50px; font-size: 1.1rem; font-weight: bold; cursor: pointer;">
                    Загрузить
                </button>
            `;
            
            modal.style.display = 'block';
        };

        window.uploadFile = async function() {
            alert('Функция загрузки временно отключена для тестирования');
            closeModal();
        };

        window.showDownloadModal = function() {
            const modal = document.getElementById('modal');
            const modalBody = document.getElementById('modalBody');
            
            modalBody.innerHTML = `
                <h2 style="margin-bottom: 20px;">Получить файл</h2>
                <input type="text" id="fileCodeInput" placeholder="Введите код файла" style="width: 100%; padding: 15px; background: var(--bg-secondary); border: 2px solid var(--border-color); border-radius: 15px; color: var(--text-primary); margin-bottom: 20px;">
                <button onclick="getFile()" style="width: 100%; padding: 18px; background: linear-gradient(135deg, #7c3aed, #6d28d9); color: white; border: none; border-radius: 50px; font-size: 1.1rem; cursor: pointer;">
                    Найти файл
                </button>
            `;
            
            modal.style.display = 'block';
        };

        window.getFile = function() {
            alert('Функция поиска временно отключена для тестирования');
            closeModal();
        };

        window.showProfile = function() {
            document.getElementById('content').innerHTML = `
                <h2 style="margin-bottom: 20px;">Мой профиль</h2>
                <div style="text-align: center; padding: 40px; color: var(--text-secondary);">
                    Здесь будут ваши файлы
                </div>
            `;
        };

        window.loadUserFiles = function() {
            document.getElementById('userFilesCount').innerHTML = 'Файлов: 0';
        };

        // ========== ВСПОМОГАТЕЛЬНЫЕ ==========
        window.closeModal = function() {
            document.getElementById('modal').style.display = 'none';
        };

        window.onclick = function(event) {
            const modal = document.getElementById('modal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        };
    </script>
</body>
</html>
