<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Lap Files - Обмен файлами</title>
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- QR Code -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        :root {
            --bg-primary: #0a0c10;
            --bg-secondary: #14181f;
            --bg-card: #1e2430;
            --text-primary: #ffffff;
            --text-secondary: #a0aec0;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border-color: #2d3748;
        }

        body {
            background: var(--bg-primary);
            min-height: 100vh;
            padding: 20px;
            color: var(--text-primary);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Анимированная кнопка Add */
        .add-button {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, var(--accent), #1e40af);
            color: white;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            text-decoration: none;
            font-weight: bold;
            font-size: 24px;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.5);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            animation: pulse 2s infinite;
            border: 2px solid rgba(255,255,255,0.2);
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 10px 25px rgba(59, 130, 246, 0.5);
            }
            50% {
                transform: scale(1.1);
                box-shadow: 0 15px 35px rgba(59, 130, 246, 0.8);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 10px 25px rgba(59, 130, 246, 0.5);
            }
        }

        .add-button:hover {
            transform: rotate(90deg) scale(1.2);
            background: linear-gradient(135deg, #2563eb, #1e3a8a);
        }

        /* Объявление сайта */
        .site-announcement {
            background: linear-gradient(135deg, #dc2626, #991b1b);
            color: white;
            padding: 15px 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2em;
            box-shadow: 0 10px 25px rgba(220, 38, 38, 0.3);
            display: none;
            animation: slideDown 0.5s ease;
        }

        .site-announcement.show {
            display: block;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Шапка */
        .header {
            background: var(--bg-card);
            border-radius: 30px;
            padding: 40px 20px;
            margin-bottom: 30px;
            text-align: center;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header h1 {
            color: var(--text-primary);
            font-size: 3.5rem;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }

        .header h1 span {
            background: linear-gradient(135deg, #60a5fa, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .premium-badge {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            padding: 8px 25px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            display: inline-block;
            animation: glow 2s infinite;
        }

        @keyframes glow {
            0%, 100% {
                box-shadow: 0 0 15px rgba(245, 158, 11, 0.3);
            }
            50% {
                box-shadow: 0 0 30px rgba(245, 158, 11, 0.6);
            }
        }

        /* Панель входа */
        .auth-panel {
            background: var(--bg-card);
            border-radius: 30px;
            padding: 40px;
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .token-input-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            max-width: 500px;
            margin: 0 auto;
        }

        .token-input-group input {
            width: 100%;
            padding: 18px 25px;
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            border-radius: 50px;
            font-size: 1.1rem;
            color: var(--text-primary);
            transition: all 0.3s;
            text-align: center;
        }

        .token-input-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
            transform: scale(1.02);
        }

        .token-input-group input::placeholder {
            color: var(--text-secondary);
            text-align: center;
        }

        .token-input-group button {
            width: 100%;
            max-width: 300px;
            padding: 18px 40px;
            background: linear-gradient(135deg, var(--accent), #1e40af);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .token-input-group button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .token-input-group button:hover::before {
            width: 300px;
            height: 300px;
        }

        .token-input-group button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.5);
        }

        .remember-checkbox {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            color: var(--text-secondary);
        }

        .remember-checkbox input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--accent);
        }

        /* Информационные блоки */
        .info-card {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 25px;
            margin: 20px 0;
            border: 1px solid var(--border-color);
            transition: all 0.3s;
        }

        .info-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 15px 30px rgba(59, 130, 246, 0.2);
        }

        .telegram-info {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            border-radius: 20px;
            padding: 25px;
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            animation: slideIn 0.7s ease;
        }

        .telegram-info a {
            background: #0088cc;
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .telegram-info a:hover {
            transform: scale(1.05);
            background: #00a0e0;
            box-shadow: 0 10px 20px rgba(0,136,204,0.3);
        }

        .premium-offer {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            padding: 25px;
            border-radius: 20px;
            margin-top: 30px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            animation: slideIn 0.8s ease;
            border: 2px solid rgba(255,255,255,0.2);
        }

        /* Основные кнопки */
        .action-buttons {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin: 40px 0;
        }

        .action-btn {
            width: 100%;
            max-width: 500px;
            padding: 25px 40px;
            border: none;
            border-radius: 60px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            position: relative;
            overflow: hidden;
        }

        .action-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .action-btn:hover::after {
            width: 500px;
            height: 500px;
        }

        .action-btn.upload {
            background: linear-gradient(135deg, #059669, #047857);
        }

        .action-btn.download {
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
        }

        .action-btn.profile {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
        }

        .action-btn:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 30px rgba(0,0,0,0.3);
        }

        .premium-label {
            background: rgba(255,255,255,0.2);
            padding: 5px 20px;
            border-radius: 30px;
            font-size: 0.9rem;
            margin-left: 10px;
        }

        /* Контент */
        .content-section {
            background: var(--bg-card);
            border-radius: 30px;
            padding: 30px;
            margin: 30px 0;
            border: 1px solid var(--border-color);
            animation: fadeIn 0.5s ease;
        }

        /* Карточки файлов */
        .files-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .file-card {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 20px;
            position: relative;
            border: 1px solid var(--border-color);
            transition: all 0.3s;
            animation: fadeIn 0.5s ease;
        }

        .file-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 15px 30px rgba(59, 130, 246, 0.2);
        }

        .file-card.premium {
            border: 2px solid #f59e0b;
        }

        .file-delete {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #dc2626;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .file-delete:hover {
            background: #b91c1c;
            transform: rotate(90deg);
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 1001;
            padding: 20px;
            overflow-y: auto;
            animation: fadeIn 0.3s;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 30px;
            padding: 40px;
            max-width: 500px;
            margin: 50px auto;
            position: relative;
            border: 1px solid var(--border-color);
            animation: slideUp 0.4s;
        }

        .close {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 35px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.3s;
        }

        .close:hover {
            color: var(--text-primary);
            transform: rotate(90deg);
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2.5rem;
            }
            
            .action-btn {
                padding: 20px 30px;
                font-size: 1.2rem;
            }
            
            .add-button {
                bottom: 20px;
                right: 20px;
                width: 60px;
                height: 60px;
                font-size: 20px;
            }
            
            .modal-content {
                padding: 30px 20px;
            }
        }

        /* Анимация загрузки */
        .loading {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 3px solid var(--border-color);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Кнопка Add -->
    <a href="#" class="add-button" id="adButton" target="_blank">+</a>

    <div class="container">
        <!-- Объявление от админа -->
        <div class="site-announcement" id="announcement"></div>

        <!-- Шапка -->
        <div class="header">
            <h1><span>Lap Files</span> от Lap.comp</h1>
            <div>
                <span class="premium-badge">💎 Премиум: 5 ГБ, безлимит файлов, бессрочно</span>
            </div>
        </div>

        <!-- Панель входа -->
        <div class="auth-panel" id="authPanel">
            <div class="token-input-group">
                <input type="text" id="tokenInput" placeholder="Введите ваш токен" autocomplete="off">
                <button onclick="login()">Войти</button>
                <label class="remember-checkbox">
                    <input type="checkbox" id="rememberMe"> Запомнить меня
                </label>
            </div>
            
            <!-- Информация о Telegram боте -->
            <div class="telegram-info">
                <span style="font-size: 1.1rem;">🔐 Нет токена? Получите в Telegram!</span>
                <a href="https://t.me/LapFilesBot" target="_blank">@LapFilesBot</a>
            </div>

            <!-- Реклама премиума -->
            <div class="premium-offer">
                💎 Премиум: загружай до 5 ГБ, безлимит файлов, бессрочное хранение! Купи в Telegram боте
            </div>
        </div>

        <!-- Панель пользователя (показывается после входа) -->
        <div class="auth-panel" id="userPanel" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px;">
                <div>
                    <h2 id="userName" style="margin-bottom: 10px;"></h2>
                    <p style="color: var(--text-secondary);">Токен: <span id="userToken"></span></p>
                    <p style="color: var(--text-secondary);" id="userStatus"></p>
                    <p style="color: var(--text-secondary);" id="userFilesCount"></p>
                </div>
                <button onclick="logout()" style="padding: 12px 30px; background: #dc2626; color: white; border: none; border-radius: 50px; cursor: pointer; font-size: 1rem; transition: all 0.3s;">Выйти</button>
            </div>
        </div>

        <!-- Админ-панель -->
        <div class="auth-panel" id="adminPanel" style="display: none; background: linear-gradient(135deg, #991b1b, #7f1d1d); color: white;">
            <h2 style="margin-bottom: 20px;">👑 Админ-панель</h2>
            <div style="display: flex; flex-direction: column; gap: 15px;">
                <textarea id="adminAnnouncement" placeholder="Текст объявления..." style="width: 100%; padding: 15px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 15px; color: white; font-size: 1rem;" rows="3"></textarea>
                <div style="display: flex; gap: 15px;">
                    <button onclick="postAnnouncement()" style="flex: 1; padding: 12px; background: white; color: #991b1b; border: none; border-radius: 50px; cursor: pointer; font-weight: bold;">Опубликовать</button>
                    <button onclick="clearAnnouncement()" style="flex: 1; padding: 12px; background: transparent; color: white; border: 2px solid white; border-radius: 50px; cursor: pointer;">Убрать</button>
                </div>
            </div>
        </div>

        <!-- Основные кнопки -->
        <div class="action-buttons" id="mainButtons" style="display: none;">
            <button class="action-btn upload" onclick="showUploadModal()">
                📤 Выложить файл
                <span class="premium-label" id="uploadLimit">до 250 МБ, макс 2</span>
            </button>
            <button class="action-btn download" onclick="showDownloadModal()">
                📥 Получить файл
                <span class="premium-label">по коду</span>
            </button>
            <button class="action-btn profile" onclick="showProfile()">
                👤 Мой профиль
                <span class="premium-label">управление</span>
            </button>
        </div>

        <!-- Контент -->
        <div class="content-section" id="content"></div>
    </div>

    <!-- Модальное окно -->
    <div class="modal" id="modal">
        <div class="modal-content" id="modalContent">
            <span class="close" onclick="closeModal()">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        // Конфигурация Supabase - ТОЛЬКО ОДИН РАЗ
        const SUPABASE_URL = 'https://pgtqiqtaoiathnhlpyqz.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_JM6hWwjvmW4l56k44e061g_mfwBkuiX';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Google Sheets API
        const SHEETS_API_URL = 'https://script.google.com/macros/s/AKfycbyTecayVPvAqw0Qx4KxBsTeSW34mNvuOAJYnyWzKHH_J8GMChfbPyavPQ9BqPwFN_pV/exec';

        // Переменные
        let currentUser = null;
        let isPremium = false;
        let isAdmin = false;
        let rememberMe = false;

        // Ссылки для кнопки Add
        const adLinks = [
            'https://bthebfr.github.io/lap-about/',
            'https://bthebfr.github.io/about/'
        ];

        // Загрузка при старте
        window.onload = async function() {
            console.log('Сайт загружен');
            
            // Устанавливаем случайную ссылку для кнопки Add
            document.getElementById('adButton').href = adLinks[Math.floor(Math.random() * adLinks.length)];
            
            // Проверяем сохраненного пользователя
            const savedUser = localStorage.getItem('lapFiles_user');
            const savedToken = localStorage.getItem('lapFiles_token');
            
            if (savedUser && savedToken) {
                currentUser = JSON.parse(savedUser);
                document.getElementById('tokenInput').value = savedToken;
                rememberMe = true;
                document.getElementById('rememberMe').checked = true;
                await login(true);
            }
            
            // Загружаем объявление
            await loadAnnouncement();
        };

        // Функция входа
        window.login = async function(silent = false) {
            console.log('Попытка входа...');
            
            const token = document.getElementById('tokenInput').value;
            rememberMe = document.getElementById('rememberMe').checked;
            
            if (!token) {
                alert('Введите токен');
                return;
            }

            try {
                // Показываем загрузку
                const loginBtn = document.querySelector('.token-input-group button');
                const originalText = loginBtn.textContent;
                loginBtn.innerHTML = '<div class="loading" style="width: 25px; height: 25px;"></div>';
                loginBtn.disabled = true;

                // Проверяем токен через Google Sheets
                const response = await fetch(`${SHEETS_API_URL}?action=getUser&token=${encodeURIComponent(token)}`);
                const user = await response.json();

                if (user && !user.error) {
                    currentUser = user;
                    isPremium = user.premium === 'ДА';
                    isAdmin = user.admin === 'ДА';
                    
                    // Обновляем интерфейс
                    document.getElementById('authPanel').style.display = 'none';
                    document.getElementById('userPanel').style.display = 'block';
                    document.getElementById('mainButtons').style.display = 'flex';
                    
                    document.getElementById('userName').innerHTML = `👋 Привет, ${user.name}!`;
                    document.getElementById('userToken').textContent = token;
                    document.getElementById('userStatus').innerHTML = isPremium ? '💎 Премиум статус' : '👤 Обычный пользователь';
                    
                    if (isPremium) {
                        document.getElementById('uploadLimit').innerHTML = 'до 5 ГБ, безлимит';
                    }
                    
                    if (isAdmin) {
                        document.getElementById('adminPanel').style.display = 'block';
                    }
                    
                    // Сохраняем если нужно
                    if (rememberMe) {
                        localStorage.setItem('lapFiles_user', JSON.stringify(user));
                        localStorage.setItem('lapFiles_token', token);
                    }
                    
                    // Загружаем файлы пользователя
                    await loadUserFiles();
                    
                    if (!silent) {
                        alert('✅ Успешный вход!');
                    }
                } else {
                    alert('❌ Неверный токен');
                }
            } catch (error) {
                console.error('Ошибка входа:', error);
                alert('❌ Ошибка при входе. Проверьте подключение к интернету.');
            } finally {
                // Восстанавливаем кнопку
                const loginBtn = document.querySelector('.token-input-group button');
                loginBtn.innerHTML = 'Войти';
                loginBtn.disabled = false;
            }
        };

        // Выход
        window.logout = function() {
            currentUser = null;
            isPremium = false;
            isAdmin = false;
            
            localStorage.removeItem('lapFiles_user');
            localStorage.removeItem('lapFiles_token');
            
            document.getElementById('authPanel').style.display = 'block';
            document.getElementById('userPanel').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('mainButtons').style.display = 'none';
            document.getElementById('content').innerHTML = '';
            document.getElementById('tokenInput').value = '';
            document.getElementById('rememberMe').checked = false;
        };

        // Загрузка объявления
        window.loadAnnouncement = async function() {
            try {
                const response = await fetch(`${SHEETS_API_URL}?action=getAnnouncement`);
                const announcement = await response.json();
                
                if (announcement && announcement.text) {
                    document.getElementById('announcement').textContent = announcement.text;
                    document.getElementById('announcement').classList.add('show');
                }
            } catch (error) {
                console.error('Ошибка загрузки объявления:', error);
            }
        };

        // Публикация объявления (админ)
        window.postAnnouncement = async function() {
            if (!isAdmin) return;
            
            const text = document.getElementById('adminAnnouncement').value;
            if (!text) return;
            
            try {
                await fetch(`${SHEETS_API_URL}?action=postAnnouncement&text=${encodeURIComponent(text)}&adminToken=${currentUser.token}`);
                await loadAnnouncement();
                alert('✅ Объявление опубликовано');
                document.getElementById('adminAnnouncement').value = '';
            } catch (error) {
                console.error('Ошибка:', error);
                alert('❌ Ошибка при публикации');
            }
        };

        // Убрать объявление
        window.clearAnnouncement = async function() {
            if (!isAdmin) return;
            
            try {
                await fetch(`${SHEETS_API_URL}?action=clearAnnouncement&adminToken=${currentUser.token}`);
                document.getElementById('announcement').classList.remove('show');
                alert('✅ Объявление убрано');
            } catch (error) {
                console.error('Ошибка:', error);
                alert('❌ Ошибка');
            }
        };

        // Показать модальное окно загрузки
        window.showUploadModal = function() {
            const modal = document.getElementById('modal');
            const modalBody = document.getElementById('modalBody');
            
            modalBody.innerHTML = `
                <h2 style="margin-bottom: 20px;">📤 Загрузить файл</h2>
                <p style="color: var(--text-secondary); margin-bottom: 20px;">${isPremium ? '💎 Премиум: до 5 ГБ, любое количество файлов' : '👤 Обычный: до 250 МБ, макс 2 файла'}</p>
                <input type="file" id="fileInput" ${isPremium ? '' : 'multiple'} style="width: 100%; padding: 15px; background: var(--bg-secondary); border: 2px solid var(--border-color); border-radius: 15px; color: var(--text-primary); margin-bottom: 20px;">
                
                <div style="margin-bottom: 20px;">
                    <label style="color: var(--text-secondary); display: block; margin-bottom: 5px;">🔒 Пароль (необязательно)</label>
                    <input type="password" id="filePassword" placeholder="Пароль для файла" style="width: 100%; padding: 15px; background: var(--bg-secondary); border: 2px solid var(--border-color); border-radius: 15px; color: var(--text-primary);">
                </div>
                
                <div style="margin-bottom: 20px;">
                    <label style="color: var(--text-secondary); display: block; margin-bottom: 5px;">⏰ Срок хранения</label>
                    <select id="fileExpiry" style="width: 100%; padding: 15px; background: var(--bg-secondary); border: 2px solid var(--border-color); border-radius: 15px; color: var(--text-primary);">
                        ${isPremium ? 
                            '<option value="9999">Бессрочно</option>' : 
                            '<option value="1">1 день</option><option value="3">3 дня</option><option value="5">5 дней (макс)</option>'
                        }
                    </select>
                </div>
                
                <div class="progress-bar" style="display: none; margin-bottom: 20px;">
                    <div class="progress-fill" id="uploadProgressFill" style="height: 10px; background: linear-gradient(90deg, var(--accent), #1e40af); border-radius: 5px; width: 0%;"></div>
                </div>
                
                <button onclick="uploadFile()" style="width: 100%; padding: 18px; background: linear-gradient(135deg, #059669, #047857); color: white; border: none; border-radius: 50px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: all 0.3s;">
                    Загрузить
                </button>
            `;
            
            modal.style.display = 'block';
        };

        // Загрузка файла
        window.uploadFile = async function() {
            const files = document.getElementById('fileInput').files;
            const password = document.getElementById('filePassword').value;
            const expiry = document.getElementById('fileExpiry').value;
            
            if (!files.length) {
                alert('Выберите файлы');
                return;
            }
            
            // Проверка лимитов
            if (!isPremium) {
                if (files.length > 2) {
                    alert('Обычные пользователи могут загружать не больше 2 файлов');
                    return;
                }
                
                for (let file of files) {
                    if (file.size > 250 * 1024 * 1024) {
                        alert('Файл слишком большой. Максимум 250 МБ');
                        return;
                    }
                }
            } else {
                let totalSize = 0;
                for (let file of files) {
                    totalSize += file.size;
                }
                if (totalSize > 5 * 1024 * 1024 * 1024) {
                    alert('Суммарный размер файлов превышает 5 ГБ');
                    return;
                }
            }
            
            document.getElementById('uploadProgressFill').style.width = '0%';
            document.querySelector('.progress-bar').style.display = 'block';
            
            try {
                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    
                    // Генерируем код файла
                    const fileCode = 'LF' + Math.random().toString(36).substr(2, 8).toUpperCase();
                    
                    // Загружаем в Supabase
                    const fileName = `${Date.now()}_${file.name}`;
                    const { data, error } = await supabase.storage
                        .from('files')
                        .upload(`${currentUser.token}/${fileName}`, file, {
                            cacheControl: '3600',
                            upsert: false
                        });
                    
                    if (error) throw error;
                    
                    // Получаем ссылку
                    const { data: { publicUrl } } = supabase.storage
                        .from('files')
                        .getPublicUrl(`${currentUser.token}/${fileName}`);
                    
                    // Сохраняем в Google Sheets
                    await fetch(`${SHEETS_API_URL}?action=saveFile`, {
                        method: 'POST',
                        body: JSON.stringify({
                            code: fileCode,
                            owner: currentUser.token,
                            name: file.name,
                            size: formatBytes(file.size),
                            type: file.type || 'unknown',
                            password: password,
                            url: publicUrl,
                            expiry: expiry,
                            ownerName: currentUser.name
                        })
                    });
                    
                    // Обновляем прогресс
                    const progress = ((i + 1) / files.length) * 100;
                    document.getElementById('uploadProgressFill').style.width = progress + '%';
                    
                    // Показываем QR для последнего файла
                    if (i === files.length - 1) {
                        showQRCode(fileCode, publicUrl);
                    }
                }
                
                alert('✅ Файлы успешно загружены!');
                closeModal();
                await loadUserFiles();
                
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                alert('❌ Ошибка при загрузке файлов');
            }
        };

        // Показать QR код
        window.showQRCode = function(fileCode, fileUrl) {
            const modal = document.getElementById('modal');
            const modalBody = document.getElementById('modalBody');
            
            modalBody.innerHTML = `
                <h2 style="margin-bottom: 20px;">✅ Файл загружен!</h2>
                <div style="text-align: center; margin-bottom: 20px;">
                    <p style="margin-bottom: 10px;">Код файла: <strong style="color: var(--accent);">${fileCode}</strong></p>
                    <p style="word-break: break-all; color: var(--text-secondary);">${fileUrl}</p>
                </div>
                <div class="qr-section" style="text-align: center;">
                    <div class="qr-code" id="qrCode" style="margin-bottom: 20px;"></div>
                    <button onclick="downloadQR()" style="padding: 12px 30px; background: var(--accent); color: white; border: none; border-radius: 50px; cursor: pointer;">
                        📥 Скачать QR-код
                    </button>
                </div>
            `;
            
            // Генерируем QR код
            QRCode.toCanvas(document.createElement('canvas'), fileUrl, { width: 200, color: { dark: '#ffffff', light: '#1e2430' } }, function(error, canvas) {
                if (!error) {
                    document.getElementById('qrCode').appendChild(canvas);
                    window.currentQRCanvas = canvas;
                }
            });
        };

        // Скачать QR код
        window.downloadQR = function() {
            if (window.currentQRCanvas) {
                const link = document.createElement('a');
                link.download = 'qrcode.png';
                link.href = window.currentQRCanvas.toDataURL();
                link.click();
            }
        };

        // Показать окно получения файла
        window.showDownloadModal = function() {
            const modal = document.getElementById('modal');
            const modalBody = document.getElementById('modalBody');
            
            modalBody.innerHTML = `
                <h2 style="margin-bottom: 20px;">📥 Получить файл</h2>
                <input type="text" id="fileCodeInput" placeholder="Введите код файла" style="width: 100%; padding: 15px; background: var(--bg-secondary); border: 2px solid var(--border-color); border-radius: 15px; color: var(--text-primary); margin-bottom: 20px;">
                <button onclick="getFile()" style="width: 100%; padding: 18px; background: linear-gradient(135deg, #7c3aed, #6d28d9); color: white; border: none; border-radius: 50px; font-size: 1.1rem; cursor: pointer;">
                    Найти файл
                </button>
            `;
            
            modal.style.display = 'block';
        };

        // Получить файл
        window.getFile = async function() {
            const fileCode = document.getElementById('fileCodeInput').value;
            
            if (!fileCode) {
                alert('Введите код файла');
                return;
            }
            
            try {
                const response = await fetch(`${SHEETS_API_URL}?action=getFile&code=${fileCode}`);
                const file = await response.json();
                
                if (file && !file.error) {
                    const modalBody = document.getElementById('modalBody');
                    
                    if (file.password) {
                        modalBody.innerHTML = `
                            <h2 style="margin-bottom: 20px;">🔒 Файл защищен паролем</h2>
                            <input type="password" id="filePasswordInput" placeholder="Введите пароль" style="width: 100%; padding: 15px; background: var(--bg-secondary); border: 2px solid var(--border-color); border-radius: 15px; color: var(--text-primary); margin-bottom: 20px;">
                            <button onclick="checkPassword('${fileCode}')" style="width: 100%; padding: 18px; background: linear-gradient(135deg, #7c3aed, #6d28d9); color: white; border: none; border-radius: 50px; cursor: pointer;">
                                Проверить пароль
                            </button>
                        `;
                    } else {
                        showFileInfo(file);
                    }
                } else {
                    alert('❌ Файл не найден');
                }
            } catch (error) {
                console.error('Ошибка:', error);
                alert('❌ Ошибка при поиске файла');
            }
        };

        // Проверка пароля
        window.checkPassword = async function(fileCode) {
            const password = document.getElementById('filePasswordInput').value;
            
            try {
                const response = await fetch(`${SHEETS_API_URL}?action=getFile&code=${fileCode}&password=${password}`);
                const file = await response.json();
                
                if (file && !file.error) {
                    showFileInfo(file);
                } else {
                    alert('❌ Неверный пароль');
                }
            } catch (error) {
                console.error('Ошибка:', error);
                alert('❌ Ошибка при проверке пароля');
            }
        };

        // Показать информацию о файле
        window.showFileInfo = function(file) {
            const modalBody = document.getElementById('modalBody');
            
            modalBody.innerHTML = `
                <h2 style="margin-bottom: 20px;">📄 Информация о файле</h2>
                <div style="background: var(--bg-secondary); padding: 20px; border-radius: 15px; margin-bottom: 20px;">
                    <p style="margin-bottom: 10px;"><strong>Название:</strong> ${file.name}</p>
                    <p style="margin-bottom: 10px;"><strong>Размер:</strong> ${file.size}</p>
                    <p style="margin-bottom: 10px;"><strong>Тип:</strong> ${file.type}</p>
                    <p style="margin-bottom: 10px;"><strong>Владелец:</strong> ${file.ownerName}</p>
                    <p><strong>Загружен:</strong> ${file.date}</p>
                </div>
                <a href="${file.url}" download style="display: block; text-align: center; padding: 18px; background: linear-gradient(135deg, #059669, #047857); color: white; text-decoration: none; border-radius: 50px; font-weight: bold;">
                    Скачать файл
                </a>
            `;
        };

        // Показать профиль
        window.showProfile = async function() {
            const content = document.getElementById('content');
            
            content.innerHTML = `
                <h2 style="margin-bottom: 20px;">👤 Мой профиль</h2>
                <div style="margin: 20px 0;">
                    <h3 style="margin-bottom: 20px;">📁 Мои файлы</h3>
                    <div class="files-grid" id="userFilesGrid"></div>
                </div>
            `;
            
            await loadUserFiles();
        };

        // Загрузить файлы пользователя
        window.loadUserFiles = async function() {
            if (!currentUser) return;
            
            try {
                const response = await fetch(`${SHEETS_API_URL}?action=getUserFiles&token=${currentUser.token}`);
                const files = await response.json();
                
                const grid = document.getElementById('userFilesGrid');
                if (grid) {
                    if (files && files.length) {
                        document.getElementById('userFilesCount').innerHTML = `📦 Файлов: ${files.length}`;
                        
                        grid.innerHTML = files.map(file => `
                            <div class="file-card ${isPremium ? 'premium' : ''}">
                                <button class="file-delete" onclick="deleteFile('${file.code}')">×</button>
                                <p style="font-weight: bold; margin-bottom: 10px;">${file.name}</p>
                                <p style="color: var(--text-secondary); margin-bottom: 5px;">📊 ${file.size}</p>
                                <p style="color: var(--text-secondary); margin-bottom: 5px;">🔑 ${file.code}</p>
                                ${file.password ? '<p style="color: #f59e0b; margin-bottom: 10px;">🔒 Защищен</p>' : ''}
                                <a href="${file.url}" target="_blank" style="display: block; text-align: center; padding: 8px; background: var(--accent); color: white; text-decoration: none; border-radius: 10px; margin: 10px 0;">Открыть</a>
                                <button onclick="changeFilePassword('${file.code}')" style="width: 100%; padding: 8px; background: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border-color); border-radius: 10px; cursor: pointer;">
                                    🔑 Сменить пароль
                                </button>
                            </div>
                        `).join('');
                    } else {
                        grid.innerHTML = '<p style="color: var(--text-secondary); text-align: center; padding: 40px;">У вас пока нет файлов</p>';
                    }
                }
            } catch (error) {
                console.error('Ошибка загрузки файлов:', error);
            }
        };

        // Удалить файл
        window.deleteFile = async function(fileCode) {
            if (!confirm('Удалить файл?')) return;
            
            try {
                await fetch(`${SHEETS_API_URL}?action=deleteFile&code=${fileCode}&token=${currentUser.token}`);
                alert('✅ Файл удален');
                await loadUserFiles();
            } catch (error) {
                console.error('Ошибка удаления:', error);
                alert('❌ Ошибка при удалении');
            }
        };

        // Сменить пароль файла
        window.changeFilePassword = function(fileCode) {
            const modal = document.getElementById('modal');
            const modalBody = document.getElementById('modalBody');
            
            modalBody.innerHTML = `
                <h2 style="margin-bottom: 20px;">🔒 Сменить пароль</h2>
                <input type="password" id="newPassword" placeholder="Новый пароль" style="width: 100%; padding: 15px; background: var(--bg-secondary); border: 2px solid var(--border-color); border-radius: 15px; color: var(--text-primary); margin-bottom: 20px;">
                <button onclick="updateFilePassword('${fileCode}')" style="width: 100%; padding: 18px; background: linear-gradient(135deg, #7c3aed, #6d28d9); color: white; border: none; border-radius: 50px; cursor: pointer;">
                    Сохранить
                </button>
            `;
            
            modal.style.display = 'block';
        };

        // Обновить пароль файла
        window.updateFilePassword = async function(fileCode) {
            const newPassword = document.getElementById('newPassword').value;
            
            try {
                await fetch(`${SHEETS_API_URL}?action=updateFilePassword&code=${fileCode}&password=${newPassword}&token=${currentUser.token}`);
                alert('✅ Пароль обновлен');
                closeModal();
                await loadUserFiles();
            } catch (error) {
                console.error('Ошибка:', error);
                alert('❌ Ошибка');
            }
        };

        // Форматирование байтов
        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // Закрыть модальное окно
        window.closeModal = function() {
            document.getElementById('modal').style.display = 'none';
        };

        // Закрытие по клику вне модального окна
        window.onclick = function(event) {
            const modal = document.getElementById('modal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        }
    </script>
</body>
</html>
