<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Lap Files - Обмен файлами</title>
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- QR Code -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --accent: #ff6b6b;
            --dark: #2d3748;
            --light: #f7fafc;
            --success: #48bb78;
            --warning: #ed8936;
            --premium: #fbbf24;
        }

        body {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Кнопка-реклама в углу */
        .ad-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, #ff8a5c, #ff4d4d);
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            z-index: 1000;
            animation: pulse 2s infinite;
            border: 2px solid white;
            font-size: 1.1rem;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* Объявление сайта */
        .site-announcement {
            background: linear-gradient(135deg, #ff6b6b, #c92a2a);
            color: white;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2em;
            box-shadow: 0 5px 15px rgba(255,0,0,0.3);
            display: none;
        }

        .site-announcement.show {
            display: block;
        }

        /* Шапка */
        .header {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .header h1 {
            color: var(--dark);
            font-size: 2.5rem;
            text-align: center;
        }

        .header h1 span {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .premium-badge {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            display: inline-block;
            margin-top: 10px;
        }

        /* Панель входа */
        .auth-panel {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .token-input-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .token-input-group input {
            flex: 1;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            min-width: 200px;
        }

        .token-input-group button {
            padding: 15px 30px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .token-input-group button:hover {
            transform: scale(1.05);
        }

        .remember-checkbox {
            display: flex;
            align-items: center;
            margin-top: 10px;
            gap: 10px;
            color: var(--dark);
        }

        .telegram-info {
            background: #e8f5e9;
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .telegram-info a {
            background: #0088cc;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        .premium-offer {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
        }

        /* Основные кнопки */
        .action-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .action-btn {
            padding: 30px;
            border: none;
            border-radius: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .action-btn.small {
            font-size: 1.2rem;
            padding: 20px;
        }

        .action-btn.upload {
            background: linear-gradient(135deg, #43e97b, #38f9d7);
        }

        .action-btn.download {
            background: linear-gradient(135deg, #fa709a, #fee140);
        }

        .action-btn.profile {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
        }

        .action-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 30px rgba(0,0,0,0.2);
        }

        .premium-label {
            background: rgba(255,255,255,0.3);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        /* Контент */
        .content-section {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* Сетка файлов */
        .files-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .file-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            position: relative;
        }

        .file-card.premium {
            border: 2px solid #fbbf24;
        }

        .file-delete {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ff6b6b;
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
        }

        /* QR секция */
        .qr-section {
            text-align: center;
            margin-top: 20px;
        }

        .qr-code {
            margin: 20px auto;
            padding: 20px;
            background: white;
            display: inline-block;
            border-radius: 10px;
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1001;
            padding: 20px;
            overflow-y: auto;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            margin: 50px auto;
            position: relative;
        }

        .close {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 30px;
            cursor: pointer;
        }

        /* Прогресс бар */
        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e2e8f0;
            border-radius: 5px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            width: 0%;
            transition: width 0.3s;
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }
            
            .action-btn {
                padding: 20px;
                font-size: 1.2rem;
            }
            
            .token-input-group {
                flex-direction: column;
            }
            
            .ad-button {
                padding: 10px 15px;
                font-size: 0.9rem;
                bottom: 10px;
                right: 10px;
            }
        }

        /* Анимации */
        @keyframes slideIn {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .animate {
            animation: slideIn 0.3s ease-out;
        }
    </style>
</head>
<body>
    <!-- Кнопка-реклама (рандомная ссылка) -->
    <a href="#" class="ad-button" id="adButton" target="_blank">✨ Lap Info ✨</a>

    <div class="container">
        <!-- Объявление от админа -->
        <div class="site-announcement" id="announcement"></div>

        <!-- Шапка -->
        <div class="header">
            <h1><span>Lap Files</span> от Lap.comp</h1>
            <div style="text-align: center;">
                <span class="premium-badge">💎 Премиум: 5 ГБ, безлимит файлов, бессрочно</span>
            </div>
        </div>

        <!-- Панель входа -->
        <div class="auth-panel" id="authPanel">
            <div class="token-input-group">
                <input type="text" id="tokenInput" placeholder="Введите ваш токен" autocomplete="off">
                <button onclick="login()">Войти</button>
            </div>
            <label class="remember-checkbox">
                <input type="checkbox" id="rememberMe"> Запомнить меня (кешировать вход)
            </label>
            
            <!-- Информация о Telegram боте -->
            <div class="telegram-info">
                <span>🔐 Нет токена? Получите в Telegram!</span>
                <a href="https://t.me/LapFilesBot" target="_blank">@LapFilesBot</a>
            </div>

            <!-- Реклама премиума -->
            <div class="premium-offer" id="premiumOffer">
                💎 Премиум: загружай до 5 ГБ, безлимит файлов, бессрочное хранение! Купи в Telegram боте
            </div>
        </div>

        <!-- Панель пользователя (показывается после входа) -->
        <div class="auth-panel" id="userPanel" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
                <div>
                    <h2 id="userName"></h2>
                    <p>Токен: <span id="userToken"></span></p>
                    <p id="userStatus"></p>
                    <p id="userFilesCount"></p>
                </div>
                <button onclick="logout()" style="padding: 10px 20px; background: #ff6b6b; color: white; border: none; border-radius: 10px; cursor: pointer;">Выйти</button>
            </div>
        </div>

        <!-- Админ-панель -->
        <div class="auth-panel" id="adminPanel" style="display: none; background: linear-gradient(135deg, #ff0844 0%, #ff4563 100%); color: white;">
            <h2>👑 Админ-панель</h2>
            <div style="margin-top: 15px;">
                <textarea id="adminAnnouncement" placeholder="Текст объявления..." style="width: 100%; padding: 10px; border-radius: 10px; margin-bottom: 10px;" rows="3"></textarea>
                <button onclick="postAnnouncement()" style="padding: 10px 20px; background: white; color: #ff0844; border: none; border-radius: 10px; cursor: pointer; margin-right: 10px;">Опубликовать</button>
                <button onclick="clearAnnouncement()" style="padding: 10px 20px; background: transparent; color: white; border: 2px solid white; border-radius: 10px; cursor: pointer;">Убрать объявление</button>
            </div>
        </div>

        <!-- Основные кнопки -->
        <div class="action-buttons" id="mainButtons" style="display: none;">
            <button class="action-btn upload" onclick="showUploadModal()">
                📤 Выложить файл
                <span class="premium-label" id="uploadLimit">до 250 МБ, макс 2 файла</span>
            </button>
            <button class="action-btn download" onclick="showDownloadModal()">
                📥 Получить файл
                <span class="premium-label">по коду</span>
            </button>
            <button class="action-btn profile" onclick="showProfile()">
                👤 Мой профиль
                <span class="premium-label">управление файлами</span>
            </button>
        </div>

        <!-- Контент -->
        <div class="content-section" id="content"></div>
    </div>

    <!-- Модальное окно -->
    <div class="modal" id="modal">
        <div class="modal-content" id="modalContent">
            <span class="close" onclick="closeModal()">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        // Конфигурация Supabase
        const SUPABASE_URL = 'https://pgtqiqtaoiathnhlpyqz.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_JM6hWwjvmW4l56k44e061g_mfwBkuiX';
        
        // Инициализация Supabase
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Google Sheets API (через Apps Script)
        const SHEETS_API_URL = 'https://script.google.com/macros/s/AKfycbyTecayVPvAqw0Qx4KxBsTeSW34mNvuOAJYnyWzKHH_J8GMChfbPyavPQ9BqPwFN_pV/exec';

        // Переменные
        let currentUser = null;
        let isPremium = false;
        let isAdmin = false;
        let rememberMe = false;

        // Ссылки для рекламной кнопки
        const adLinks = [
            'https://bthebfr.github.io/lap-about/',
            'https://bthebfr.github.io/about/'
        ];

        // Устанавливаем случайную ссылку для кнопки
        document.getElementById('adButton').href = adLinks[Math.floor(Math.random() * adLinks.length)];

        // Загрузка сохраненного пользователя
        window.onload = async function() {
            const savedUser = localStorage.getItem('lapFiles_user');
            const savedToken = localStorage.getItem('lapFiles_token');
            
            if (savedUser && savedToken) {
                currentUser = JSON.parse(savedUser);
                document.getElementById('tokenInput').value = savedToken;
                rememberMe = true;
                document.getElementById('rememberMe').checked = true;
                await login(true);
            }
            
            // Загружаем объявление
            await loadAnnouncement();
        };

        // Функция входа
        async function login(silent = false) {
            const token = document.getElementById('tokenInput').value;
            rememberMe = document.getElementById('rememberMe').checked;
            
            if (!token) {
                alert('Введите токен');
                return;
            }

            try {
                // Проверяем токен в Google Sheets
                const response = await fetch(`${SHEETS_API_URL}?action=getUser&token=${token}`);
                const user = await response.json();

                if (user) {
                    currentUser = user;
                    isPremium = user.premium === 'ДА';
                    isAdmin = user.admin === 'ДА';
                    
                    // Обновляем интерфейс
                    document.getElementById('authPanel').style.display = 'none';
                    document.getElementById('userPanel').style.display = 'block';
                    document.getElementById('mainButtons').style.display = 'grid';
                    
                    document.getElementById('userName').textContent = `👋 Привет, ${user.name}!`;
                    document.getElementById('userToken').textContent = token;
                    document.getElementById('userStatus').textContent = isPremium ? '💎 Премиум' : '👤 Обычный пользователь';
                    
                    if (isPremium) {
                        document.getElementById('uploadLimit').innerHTML = 'до 5 ГБ, безлимит файлов';
                    }
                    
                    if (isAdmin) {
                        document.getElementById('adminPanel').style.display = 'block';
                    }
                    
                    // Сохраняем если нужно
                    if (rememberMe) {
                        localStorage.setItem('lapFiles_user', JSON.stringify(user));
                        localStorage.setItem('lapFiles_token', token);
                    }
                    
                    // Загружаем файлы пользователя
                    await loadUserFiles();
                    
                    if (!silent) {
                        alert('Успешный вход!');
                    }
                } else {
                    alert('Неверный токен');
                }
            } catch (error) {
                console.error('Ошибка входа:', error);
                alert('Ошибка при входе');
            }
        }

        // Выход
        function logout() {
            currentUser = null;
            isPremium = false;
            isAdmin = false;
            
            localStorage.removeItem('lapFiles_user');
            localStorage.removeItem('lapFiles_token');
            
            document.getElementById('authPanel').style.display = 'block';
            document.getElementById('userPanel').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('mainButtons').style.display = 'none';
            document.getElementById('content').innerHTML = '';
            document.getElementById('tokenInput').value = '';
            document.getElementById('rememberMe').checked = false;
        }

        // Загрузка объявления
        async function loadAnnouncement() {
            try {
                const response = await fetch(`${SHEETS_API_URL}?action=getAnnouncement`);
                const announcement = await response.json();
                
                if (announcement && announcement.text) {
                    document.getElementById('announcement').textContent = announcement.text;
                    document.getElementById('announcement').classList.add('show');
                }
            } catch (error) {
                console.error('Ошибка загрузки объявления:', error);
            }
        }

        // Публикация объявления (админ)
        async function postAnnouncement() {
            if (!isAdmin) return;
            
            const text = document.getElementById('adminAnnouncement').value;
            if (!text) return;
            
            try {
                await fetch(`${SHEETS_API_URL}?action=postAnnouncement&text=${encodeURIComponent(text)}&adminToken=${currentUser.token}`);
                await loadAnnouncement();
                alert('Объявление опубликовано');
            } catch (error) {
                console.error('Ошибка:', error);
            }
        }

        // Убрать объявление
        async function clearAnnouncement() {
            if (!isAdmin) return;
            
            try {
                await fetch(`${SHEETS_API_URL}?action=clearAnnouncement&adminToken=${currentUser.token}`);
                document.getElementById('announcement').classList.remove('show');
                alert('Объявление убрано');
            } catch (error) {
                console.error('Ошибка:', error);
            }
        }

        // Показать модальное окно загрузки
        function showUploadModal() {
            const modal = document.getElementById('modal');
            const modalBody = document.getElementById('modalBody');
            
            modalBody.innerHTML = `
                <h2>📤 Загрузить файл</h2>
                <p>${isPremium ? '💎 Премиум: до 5 ГБ, любое количество файлов' : '👤 Обычный: до 250 МБ, макс 2 файла'}</p>
                <input type="file" id="fileInput" ${isPremium ? '' : 'multiple'} style="margin: 20px 0; padding: 10px;">
                
                <div style="margin: 20px 0;">
                    <label>Защитить паролем (необязательно)</label>
                    <input type="password" id="filePassword" placeholder="Пароль для файла" style="width: 100%; padding: 10px; margin-top: 5px;">
                </div>
                
                <div style="margin: 20px 0;">
                    <label>Срок хранения</label>
                    <select id="fileExpiry" style="width: 100%; padding: 10px; margin-top: 5px;">
                        ${isPremium ? 
                            '<option value="9999">Бессрочно</option>' : 
                            '<option value="1">1 день</option><option value="3">3 дня</option><option value="5">5 дней (макс)</option>'
                        }
                    </select>
                </div>
                
                <div class="progress-bar" style="display: none;" id="uploadProgress">
                    <div class="progress-fill" id="uploadProgressFill"></div>
                </div>
                
                <button onclick="uploadFile()" style="width: 100%; padding: 15px; background: linear-gradient(135deg, #43e97b, #38f9d7); color: white; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer;">
                    Загрузить
                </button>
            `;
            
            modal.style.display = 'block';
        }

        // Загрузка файла
        async function uploadFile() {
            const files = document.getElementById('fileInput').files;
            const password = document.getElementById('filePassword').value;
            const expiry = document.getElementById('fileExpiry').value;
            
            if (!files.length) {
                alert('Выберите файлы');
                return;
            }
            
            // Проверка лимитов
            if (!isPremium) {
                if (files.length > 2) {
                    alert('Обычные пользователи могут загружать не больше 2 файлов');
                    return;
                }
                
                for (let file of files) {
                    if (file.size > 250 * 1024 * 1024) {
                        alert('Файл слишком большой. Максимум 250 МБ');
                        return;
                    }
                }
            } else {
                let totalSize = 0;
                for (let file of files) {
                    totalSize += file.size;
                }
                if (totalSize > 5 * 1024 * 1024 * 1024) {
                    alert('Суммарный размер файлов превышает 5 ГБ');
                    return;
                }
            }
            
            document.getElementById('uploadProgress').style.display = 'block';
            
            try {
                for (let file of files) {
                    // Генерируем код файла
                    const fileCode = 'LF' + Math.random().toString(36).substr(2, 8).toUpperCase();
                    
                    // Загружаем в Supabase
                    const fileName = `${Date.now()}_${file.name}`;
                    const { data, error } = await supabase.storage
                        .from('files')
                        .upload(`${currentUser.token}/${fileName}`, file, {
                            cacheControl: '3600',
                            upsert: false
                        });
                    
                    if (error) throw error;
                    
                    // Получаем ссылку
                    const { data: { publicUrl } } = supabase.storage
                        .from('files')
                        .getPublicUrl(`${currentUser.token}/${fileName}`);
                    
                    // Сохраняем в Google Sheets
                    await fetch(`${SHEETS_API_URL}?action=saveFile`, {
                        method: 'POST',
                        body: JSON.stringify({
                            code: fileCode,
                            owner: currentUser.token,
                            name: file.name,
                            size: formatBytes(file.size),
                            type: file.type || 'unknown',
                            password: password,
                            url: publicUrl,
                            expiry: expiry,
                            ownerName: currentUser.name
                        })
                    });
                    
                    // Показываем QR код
                    showQRCode(fileCode, publicUrl);
                }
                
                alert('Файлы успешно загружены!');
                closeModal();
                await loadUserFiles();
                
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                alert('Ошибка при загрузке файлов');
            }
        }

        // Показать QR код
        function showQRCode(fileCode, fileUrl) {
            const modal = document.getElementById('modal');
            const modalBody = document.getElementById('modalBody');
            
            modalBody.innerHTML = `
                <h2>✅ Файл загружен!</h2>
                <p>Код файла: <strong>${fileCode}</strong></p>
                <p>Ссылка: <a href="${fileUrl}" target="_blank">${fileUrl}</a></p>
                <div class="qr-section">
                    <div class="qr-code" id="qrCode"></div>
                    <button onclick="downloadQR()" style="padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; margin-top: 10px;">
                        Скачать QR-код
                    </button>
                </div>
            `;
            
            // Генерируем QR код
            QRCode.toCanvas(document.createElement('canvas'), fileUrl, { width: 200 }, function(error, canvas) {
                if (!error) {
                    document.getElementById('qrCode').appendChild(canvas);
                    window.currentQRCanvas = canvas;
                }
            });
            
            modal.style.display = 'block';
        }

        // Скачать QR код
        function downloadQR() {
            if (window.currentQRCanvas) {
                const link = document.createElement('a');
                link.download = 'qrcode.png';
                link.href = window.currentQRCanvas.toDataURL();
                link.click();
            }
        }

        // Показать окно получения файла
        function showDownloadModal() {
            const modal = document.getElementById('modal');
            const modalBody = document.getElementById('modalBody');
            
            modalBody.innerHTML = `
                <h2>📥 Получить файл</h2>
                <input type="text" id="fileCodeInput" placeholder="Введите код файла" style="width: 100%; padding: 15px; margin: 20px 0; border: 2px solid #e2e8f0; border-radius: 10px;">
                <button onclick="getFile()" style="width: 100%; padding: 15px; background: linear-gradient(135deg, #fa709a, #fee140); color: white; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer;">
                    Найти файл
                </button>
            `;
            
            modal.style.display = 'block';
        }

        // Получить файл
        async function getFile() {
            const fileCode = document.getElementById('fileCodeInput').value;
            
            if (!fileCode) {
                alert('Введите код файла');
                return;
            }
            
            try {
                const response = await fetch(`${SHEETS_API_URL}?action=getFile&code=${fileCode}`);
                const file = await response.json();
                
                if (file) {
                    const modalBody = document.getElementById('modalBody');
                    
                    if (file.password) {
                        modalBody.innerHTML = `
                            <h2>🔒 Файл защищен паролем</h2>
                            <input type="password" id="filePasswordInput" placeholder="Введите пароль" style="width: 100%; padding: 15px; margin: 20px 0; border: 2px solid #e2e8f0; border-radius: 10px;">
                            <button onclick="checkPassword('${fileCode}')" style="width: 100%; padding: 15px; background: linear-gradient(135deg, #fa709a, #fee140); color: white; border: none; border-radius: 10px; cursor: pointer;">
                                Проверить пароль
                            </button>
                        `;
                    } else {
                        showFileInfo(file);
                    }
                } else {
                    alert('Файл не найден');
                }
            } catch (error) {
                console.error('Ошибка:', error);
                alert('Ошибка при поиске файла');
            }
        }

        // Проверка пароля
        async function checkPassword(fileCode) {
            const password = document.getElementById('filePasswordInput').value;
            
            try {
                const response = await fetch(`${SHEETS_API_URL}?action=getFile&code=${fileCode}&password=${password}`);
                const file = await response.json();
                
                if (file) {
                    showFileInfo(file);
                } else {
                    alert('Неверный пароль');
                }
            } catch (error) {
                console.error('Ошибка:', error);
                alert('Ошибка при проверке пароля');
            }
        }

        // Показать информацию о файле
        function showFileInfo(file) {
            const modalBody = document.getElementById('modalBody');
            
            modalBody.innerHTML = `
                <h2>📄 Информация о файле</h2>
                <div style="margin: 20px 0;">
                    <p><strong>Название:</strong> ${file.name}</p>
                    <p><strong>Размер:</strong> ${file.size}</p>
                    <p><strong>Тип:</strong> ${file.type}</p>
                    <p><strong>Владелец:</strong> ${file.ownerName}</p>
                    <p><strong>Загружен:</strong> ${file.date}</p>
                </div>
                <a href="${file.url}" download style="display: block; text-align: center; padding: 15px; background: linear-gradient(135deg, #43e97b, #38f9d7); color: white; text-decoration: none; border-radius: 10px; font-weight: bold;">
                    Скачать файл
                </a>
            `;
        }

        // Показать профиль
        async function showProfile() {
            const content = document.getElementById('content');
            
            content.innerHTML = `
                <h2>👤 Мой профиль</h2>
                <div style="margin: 20px 0;">
                    <h3>Мои файлы</h3>
                    <div class="files-grid" id="userFilesGrid"></div>
                </div>
            `;
            
            await loadUserFiles();
        }

        // Загрузить файлы пользователя
        async function loadUserFiles() {
            if (!currentUser) return;
            
            try {
                const response = await fetch(`${SHEETS_API_URL}?action=getUserFiles&token=${currentUser.token}`);
                const files = await response.json();
                
                const grid = document.getElementById('userFilesGrid');
                if (grid) {
                    if (files && files.length) {
                        document.getElementById('userFilesCount').textContent = `📦 Файлов: ${files.length}`;
                        
                        grid.innerHTML = files.map(file => `
                            <div class="file-card ${isPremium ? 'premium' : ''}">
                                <button class="file-delete" onclick="deleteFile('${file.code}')">×</button>
                                <p><strong>${file.name}</strong></p>
                                <p>Размер: ${file.size}</p>
                                <p>Код: ${file.code}</p>
                                ${file.password ? '<p>🔒 Защищен</p>' : ''}
                                <p>Ссылка: <a href="${file.url}" target="_blank">открыть</a></p>
                                <button onclick="changeFilePassword('${file.code}')" style="width: 100%; padding: 5px; margin-top: 10px; background: var(--primary); color: white; border: none; border-radius: 5px; cursor: pointer;">
                                    Сменить пароль
                                </button>
                            </div>
                        `).join('');
                    } else {
                        grid.innerHTML = '<p>У вас пока нет файлов</p>';
                    }
                }
            } catch (error) {
                console.error('Ошибка загрузки файлов:', error);
            }
        }

        // Удалить файл
        async function deleteFile(fileCode) {
            if (!confirm('Удалить файл?')) return;
            
            try {
                // Удаляем из Supabase
                const { data, error } = await supabase.storage
                    .from('files')
                    .remove([`${currentUser.token}/${fileCode}`]);
                
                // Удаляем из Google Sheets
                await fetch(`${SHEETS_API_URL}?action=deleteFile&code=${fileCode}&token=${currentUser.token}`);
                
                alert('Файл удален');
                await loadUserFiles();
            } catch (error) {
                console.error('Ошибка удаления:', error);
            }
        }

        // Сменить пароль файла
        function changeFilePassword(fileCode) {
            const modal = document.getElementById('modal');
            const modalBody = document.getElementById('modalBody');
            
            modalBody.innerHTML = `
                <h2>🔒 Сменить пароль</h2>
                <input type="password" id="newPassword" placeholder="Новый пароль" style="width: 100%; padding: 15px; margin: 20px 0; border: 2px solid #e2e8f0; border-radius: 10px;">
                <button onclick="updateFilePassword('${fileCode}')" style="width: 100%; padding: 15px; background: linear-gradient(135deg, #fa709a, #fee140); color: white; border: none; border-radius: 10px; cursor: pointer;">
                    Сохранить
                </button>
            `;
            
            modal.style.display = 'block';
        }

        // Обновить пароль файла
        async function updateFilePassword(fileCode) {
            const newPassword = document.getElementById('newPassword').value;
            
            try {
                await fetch(`${SHEETS_API_URL}?action=updateFilePassword&code=${fileCode}&password=${newPassword}&token=${currentUser.token}`);
                alert('Пароль обновлен');
                closeModal();
                await loadUserFiles();
            } catch (error) {
                console.error('Ошибка:', error);
            }
        }

        // Форматирование байтов
        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // Закрыть модальное окно
        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        // Закрытие по клику вне модального окна
        window.onclick = function(event) {
            const modal = document.getElementById('modal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        }
    </script>
</body>
</html>
